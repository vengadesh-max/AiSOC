# ──────────────────────────────────────────────────────────────────────────────
# AiSOC Demo - API service (FastAPI)
#
# Deployed at:    https://aisoc-demo-api.fly.dev
# Internal name:  aisoc-demo-api.internal:8000
#
# Reads:  Postgres (Fly managed), Redis (Upstash via Fly), demo tenant
# Writes: Postgres (cases, alerts, runs, events)
# ──────────────────────────────────────────────────────────────────────────────

app = "aisoc-demo-api"
primary_region = "iad"          # us-east, lowest latency to demo.aisoc.dev
kill_signal    = "SIGINT"
kill_timeout   = "5s"

# Dockerfile path is relative to the build context (= the service source dir).
# The deploy script runs `flyctl deploy` from `services/api/` so `COPY . .`
# in the Dockerfile sees the API source. See infra/fly/fly-demo-deploy.sh.
[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT      = "demo"
  LOG_LEVEL        = "info"
  PORT             = "8000"
  # Demo gates: write actions return 403, mutating endpoints become read-only
  AISOC_DEMO_MODE  = "true"
  # Tenant rotation runs daily; the seeder writes the canonical INC-001 case
  AISOC_DEMO_TENANT = "demo"
  # Disable optional integrations (no Kafka/ClickHouse/OpenSearch on demo)
  AISOC_DISABLE_KAFKA      = "true"
  AISOC_DISABLE_CLICKHOUSE = "true"
  AISOC_DISABLE_OPENSEARCH = "true"
  AISOC_DISABLE_NEO4J      = "true"
  AISOC_DISABLE_QDRANT     = "true"
  # The demo_seed entrypoint runs inside this container (post-deploy via
  # `flyctl ssh console -C "python -m app.scripts.demo_seed …"` and via a
  # daily cron machine). It needs to reach the API locally and the agents
  # app over Fly's internal 6PN DNS.
  CORE_API_URL    = "http://localhost:8000"
  AGENTS_API_URL  = "http://aisoc-demo-agents.internal:8084"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1       # keep one warm for sub-60s TTFI
  processes           = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  size      = "shared-cpu-1x"
  memory_mb = 1024
