# ──────────────────────────────────────────────────────────────────────────────
# AiSOC Demo - Web (Next.js)
#
# Deployed at:    https://aisoc-demo-web.fly.dev
# Public domain:  https://demo.aisoc.dev (configured via Fly certs)
#
# This is the only public-facing service. The api/agents/realtime fly apps
# only expose internal addressing through the .internal DNS to keep the
# demo's blast radius small.
#
# Reads: api (HTTP), realtime (WSS)
# ──────────────────────────────────────────────────────────────────────────────

app = "aisoc-demo-web"
primary_region = "iad"
kill_signal    = "SIGINT"
kill_timeout   = "5s"

# Web Dockerfile expects the *monorepo root* as build context (it COPYs
# pnpm-workspace.yaml + packages/* to resolve workspace deps). The deploy
# script runs `flyctl deploy` from the repo root, and we point at the
# Dockerfile via its repo-relative path.
[build]
  dockerfile = "apps/web/Dockerfile"

[env]
  NODE_ENV               = "production"
  PORT                   = "3000"
  NEXT_PUBLIC_DEMO_MODE  = "true"
  # Public URLs: web is public, api/realtime are accessed through public Fly hostnames
  # so the browser can reach them. In a self-hosted setup these would be private.
  NEXT_PUBLIC_API_URL    = "https://aisoc-demo-api.fly.dev"
  NEXT_PUBLIC_WS_URL     = "wss://aisoc-demo-realtime.fly.dev"
  NEXT_PUBLIC_DEMO_RESET = "daily-utc-0000"
  NEXT_PUBLIC_DEMO_BANNER = "Demo data resets daily at 00:00 UTC. All write actions are disabled."
  # Default landing in demo mode: pre-seeded incident with running investigation
  NEXT_PUBLIC_DEMO_DEEPLINK = "/cases/INC-001?tab=ledger"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1       # keep warm to hit sub-60s time-to-first-investigation
  processes           = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/api/health"

[[vm]]
  size      = "shared-cpu-1x"
  memory_mb = 1024
