apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aisoc.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aisoc.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.global.logLevel | default "info" | quote }}
  ENVIRONMENT: {{ .Values.global.environment | default "production" | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.global.otelEndpoint | default "" | quote }}
  OTEL_SERVICE_NAME: {{ include "aisoc.fullname" . | quote }}
  {{- range $k, $v := .Values.global.extraConfig }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
