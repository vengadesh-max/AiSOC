apiVersion: v2
name: aisoc
description: AiSOC - AI Security Operations Center by Cyble
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - security
  - soc
  - ai
  - siem
  - soar

home: https://github.com/beenuar/AiSOC
sources:
  - https://github.com/beenuar/AiSOC

maintainers:
  - name: Cyble
    email: opensource@cyble.com

dependencies:
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
