id: det-cloud-011
name: AWS VPC Flow Logs Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS VPC Flow Logs
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name == "DeleteFlowLogs"
false_positives:
- VPC decommission (change ticketed, vpc-state=deleting tag)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
