id: det-cloud-027
name: GCP Service Account Key Created
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Service Account
  Key Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "google.iam.admin.v1.CreateServiceAccountKey"
false_positives:
- IaC tooling using key-pair auth (must be tagged purpose=iac)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
