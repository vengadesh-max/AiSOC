id: det-cloud-009
name: AWS CloudTrail Logging Disabled
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS CloudTrail Logging
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name IN ["StopLogging", "DeleteTrail", "UpdateTrail"]
false_positives:
- Log-trail consolidation during account merge (change ticketed)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
