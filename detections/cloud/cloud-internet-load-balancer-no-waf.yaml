id: det-cloud-039
name: Internet-Facing Load Balancer Without WAF
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Internet-Facing Load
  Balancer Without WAF'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1190
- tlp.white
category: cloud
log_source:
  product: cloud
  service: lb
detection:
  condition: |
    event_name IN ["CreateLoadBalancer", "ModifyLoadBalancerAttributes"]
    AND scheme == "internet-facing"
    AND waf_attached == false
false_positives:
- Health-check / status-page endpoints (must be tagged purpose=status)
playbook: tpl-cloud-misconfig
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
