id: det-cloud-019
name: Azure Key Vault Key Deleted
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Key Vault Key
  Deleted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: azure
  service: keyvault
detection:
  condition: |
    operation_name IN ["KeyDelete", "VaultDelete"]
false_positives:
- Key rotation cleanup (paired with KeyCreate within 24h)
playbook: tpl-data-destruction
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
