id: det-cloud-029
name: GCP Firewall Rule Allowing 0.0.0.0/0 Inbound
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Firewall Rule
  Allowing 0.0.0.0/0 Inbound'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1190
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "compute.firewalls.insert"
    AND source_range == "0.0.0.0/0"
    AND port IN [22, 3389, 5432, 3306, 6379]
false_positives:
- External load balancer subnet (tagged role=public-lb)
playbook: tpl-cloud-misconfig
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
