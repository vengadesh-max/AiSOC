id: det-cloud-038
name: Terraform State File Stored in Public Bucket
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Terraform State File
  Stored in Public Bucket'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1530
- mitre.attack.t1552.001
- tlp.white
category: cloud
log_source:
  product: cloud
  service: storage
detection:
  condition: |
    object_path ENDSWITH ".tfstate"
    AND bucket_visibility == "public"
false_positives:
- Demo/training repos (must be in dedicated demo project)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
