id: det-cloud-021
name: Azure Storage Account Container Made Public
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure Storage Account
  Container Made Public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name == "Microsoft.Storage/storageAccounts/blobServices/containers/write"
    AND public_access IN ["blob", "container"]
false_positives:
- Static website hosting (purpose=public tag required)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
