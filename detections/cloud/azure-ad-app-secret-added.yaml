id: det-cloud-017
name: Azure AD Application Credential Added
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure AD Application
  Credential Added'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: azure
  service: azuread-audit
detection:
  condition: |
    operation_name == "Update application - Certificates and secrets management"
false_positives:
- Application owner rotating credentials (must be tagged change ticketed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
