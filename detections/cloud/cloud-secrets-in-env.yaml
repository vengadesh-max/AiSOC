id: det-cloud-036
name: Cloud Workload Spawned with Secrets in Environment Variables
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Cloud Workload Spawned
  with Secrets in Environment Variables'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1552.001
- tlp.white
category: cloud
log_source:
  product: cloud
  service: workload
detection:
  condition: |
    event_name IN ["RunInstances", "RunPods", "DeployContainer"]
    AND env_has_secret == true
false_positives:
- Legacy workloads pre-migration to a secret-store (decommission ticket required)
playbook: tpl-cloud-misconfig
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
