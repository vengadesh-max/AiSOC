id: det-cloud-002
name: AWS IAM Enumeration Burst
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Enumeration
  Burst'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1087.004
- mitre.attack.t1069.003
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_source == "iam.amazonaws.com"
    AND event_name_count > 25
    AND time_window_minutes < 5
false_positives:
- Compliance scanners (AWS Config, Prowler, CloudCustodian)
- IaC tools running plan/apply
playbook: tpl-cloud-recon
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
