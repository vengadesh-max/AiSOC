id: det-cloud-023
name: Azure AD App Registration Granted Broad Graph Scope
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure AD App Registration
  Granted Broad Graph Scope'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: azure
  service: azuread-audit
detection:
  condition: |
    operation_name == "Add app role assignment to service principal"
    AND scope IN ["Mail.ReadWrite", "Files.ReadWrite.All", "Directory.ReadWrite.All", "User.ReadWrite.All"]
false_positives:
- IT service-account onboarding (must be ticketed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
