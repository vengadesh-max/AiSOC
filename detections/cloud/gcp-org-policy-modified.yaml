id: det-cloud-032
name: GCP Organization Policy Modified
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Organization Policy
  Modified'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.008
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name ENDSWITH ".SetOrgPolicy"
false_positives:
- Approved policy change (must reference change ticket in metadata)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
