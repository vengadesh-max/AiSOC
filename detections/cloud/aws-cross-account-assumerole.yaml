id: det-cloud-014
name: AWS AssumeRole from Untrusted External Account
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS AssumeRole from
  Untrusted External Account'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- mitre.attack.t1199
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name == "AssumeRole"
    AND user_arn_external_account == true
    AND external_account_in_allowlist == false
false_positives:
- Trusted partner accounts (must be in allowlist)
- Org-internal cross-account scripts
playbook: tpl-cloud-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
