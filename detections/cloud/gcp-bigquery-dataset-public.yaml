id: det-cloud-035
name: GCP BigQuery Dataset Made Public
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP BigQuery Dataset
  Made Public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "google.cloud.bigquery.v2.DatasetService.UpdateDataset"
    AND iam_member IN ["allUsers", "allAuthenticatedUsers"]
false_positives:
- Public datasets program (purpose=public tag required)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
