id: det-cloud-008
name: AWS KMS Key Disabled or Scheduled for Deletion
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS KMS Key Disabled
  or Scheduled for Deletion'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1485
- mitre.attack.t1486
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name IN ["DisableKey", "ScheduleKeyDeletion"]
false_positives:
- Decommission of expired key material (must reference change ticket)
playbook: tpl-data-destruction
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
