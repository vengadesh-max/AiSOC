id: det-cloud-026
name: GCP IAM Primitive Role (Owner/Editor) Granted
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP IAM Primitive
  Role (Owner/Editor) Granted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "SetIamPolicy"
    AND role IN ["roles/owner", "roles/editor"]
false_positives:
- Initial bootstrap (one-time, ticketed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
