id: det-cloud-034
name: GCP Secret Manager Mass AccessSecretVersion
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Secret Manager
  Mass AccessSecretVersion'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1555.005
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "google.cloud.secretmanager.v1.SecretManagerService.AccessSecretVersion"
    AND secret_count_per_principal > 25
    AND time_window_minutes < 10
false_positives:
- Boot of large microservice fleet (must be a known service principal in allowlist)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
