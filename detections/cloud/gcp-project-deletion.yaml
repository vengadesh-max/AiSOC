id: det-cloud-030
name: GCP Project Marked for Deletion
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Project Marked
  for Deletion'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "DeleteProject"
false_positives:
- Sandbox project cleanup (project name must contain -sbx or -test)
playbook: tpl-data-destruction
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
