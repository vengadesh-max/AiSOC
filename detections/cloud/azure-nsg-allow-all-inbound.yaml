id: det-cloud-020
name: Azure NSG Rule Allowing 0.0.0.0/0 Inbound
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure NSG Rule Allowing
  0.0.0.0/0 Inbound'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1190
- tlp.white
category: cloud
log_source:
  product: azure
  service: activity
detection:
  condition: |
    operation_name == "Microsoft.Network/networkSecurityGroups/securityRules/write"
    AND rule_source == "*"
    AND rule_destination_port IN [22, 3389, 1433, 3306, 6379]
false_positives:
- Public load balancer subnet (tag = role:public-lb)
playbook: tpl-cloud-misconfig
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
