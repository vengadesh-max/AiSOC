id: det-cloud-028
name: GCP GCS Bucket Set to Public
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP GCS Bucket Set
  to Public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "storage.setIamPermissions"
    AND iam_member IN ["allUsers", "allAuthenticatedUsers"]
false_positives:
- Public website hosting (must be tagged purpose=public)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
