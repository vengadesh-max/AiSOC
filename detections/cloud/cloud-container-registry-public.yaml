id: det-cloud-037
name: Container Registry Repository Made Public
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Container Registry
  Repository Made Public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1525
- tlp.white
category: cloud
log_source:
  product: cloud
  service: registry
detection:
  condition: |
    event_name IN ["UpdateRepositoryVisibility", "SetIamPolicy"]
    AND visibility == "public"
false_positives:
- Public OSS image publishing (purpose=public-oss tag required)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
