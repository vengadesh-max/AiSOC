id: det-cloud-033
name: GCP Service Account Impersonation Outside Allowlist
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'GCP Service Account
  Impersonation Outside Allowlist'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: cloud
log_source:
  product: gcp
  service: audit
detection:
  condition: |
    method_name == "GenerateAccessToken"
    AND impersonator_in_allowlist == false
false_positives:
- IT support break-glass (allowlisted impersonator only)
playbook: tpl-cloud-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
