id: det-cloud-016
name: Azure AD Owner/Global-Admin Role Assignment
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure AD Owner/Global-Admin
  Role Assignment'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1098.003
- tlp.white
category: cloud
log_source:
  product: azure
  service: azuread-audit
detection:
  condition: |
    operation_name == "AddMemberToRole"
    AND role_name IN ["Global Administrator", "Privileged Role Administrator", "Owner"]
false_positives:
- Initial tenant bootstrap (must be ticketed)
- Break-glass account assignment
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
