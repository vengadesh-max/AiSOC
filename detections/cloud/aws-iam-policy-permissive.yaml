id: det-cloud-007
name: AWS IAM Policy with Wildcard Action
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS IAM Policy with
  Wildcard Action'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- mitre.attack.t1098.001
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name IN ["PutUserPolicy", "PutRolePolicy", "AttachUserPolicy"]
    AND policy_action == "*"
    AND policy_resource == "*"
false_positives:
- Bootstrap admin role (one-time, change ticketed)
- Break-glass policy
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
