id: det-cloud-018
name: Azure AD Conditional Access Policy Disabled or Removed
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'Azure AD Conditional
  Access Policy Disabled or Removed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1562.001
- tlp.white
category: cloud
log_source:
  product: azure
  service: azuread-audit
detection:
  condition: |
    operation_name IN ["Update conditional access policy", "Delete conditional access policy"]
    AND policy_state == "disabled"
false_positives:
- Policy migration (must reference replacement policy)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
