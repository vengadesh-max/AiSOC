id: det-cloud-012
name: AWS RDS Instance Set Publicly Accessible
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS RDS Instance Set
  Publicly Accessible'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1190
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name IN ["CreateDBInstance", "ModifyDBInstance"]
    AND publicly_accessible == true
false_positives:
- Test/sandbox RDS bound to bastion subnet only (must not happen)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
