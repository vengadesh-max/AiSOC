id: det-cloud-015
name: AWS S3 GetObject Volume Anomaly per Principal
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS S3 GetObject Volume
  Anomaly per Principal'. Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name == "GetObject"
    AND object_count_per_principal > 5000
    AND time_window_minutes < 30
false_positives:
- Bulk-export jobs (must use tagged batch role)
- Backup tooling
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
