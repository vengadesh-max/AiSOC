id: det-cloud-013
name: AWS EBS Snapshot Made Public
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS EBS Snapshot Made
  Public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1530
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name == "ModifySnapshotAttribute"
    AND createvolumepermission == "all"
false_positives:
- Public AMI publication for community open-source projects (must be tagged purpose=public-ami)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
