id: det-cloud-004
name: AWS S3 Bucket Deletion
description: AiSOC v1 curated detection. Triggers on the cloud signal described by 'AWS S3 Bucket Deletion'.
  Watch the 2 documented false-positive cases before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name == "DeleteBucket"
false_positives:
- Automated cleanup of ephemeral testing buckets
- Decommission via change-control ticket
playbook: tpl-data-destruction
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
