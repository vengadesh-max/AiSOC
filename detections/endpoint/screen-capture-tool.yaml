id: det-endpoint-040
name: Screen-Capture Tool Use on Sensitive Workstation
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Screen-Capture
  Tool Use on Sensitive Workstation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1113
- tlp.white
category: endpoint
log_source:
  product: edr
  service: process-create
detection:
  condition: |
    image_basename IN ["snippingtool.exe", "screenclippinghost.exe", "obs64.exe", "obs.exe"]
    AND host_role == "sensitive"
false_positives:
- Approved training-session recording (must be ticketed)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
