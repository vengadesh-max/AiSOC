id: det-endpoint-038
name: Remote Management Tool Installed Outside Allowlist
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Remote Management
  Tool Installed Outside Allowlist'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1219
- tlp.white
category: endpoint
log_source:
  product: edr
  service: process-create
detection:
  condition: |
    image_basename IN ["AnyDesk.exe", "TeamViewer.exe", "ScreenConnect.ClientService.exe", "atera_agent.exe", "splashtop.exe"]
    AND image_basename_in_allowlist == false
false_positives:
- IT-managed remote support tools (allowlisted)
playbook: tpl-malware-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
