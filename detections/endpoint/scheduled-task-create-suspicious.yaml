id: det-endpoint-007
name: Scheduled Task Created Pointing to Suspicious Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Scheduled Task
  Created Pointing to Suspicious Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1053.005
- tlp.white
category: endpoint
log_source:
  product: edr
  service: scheduled-task
detection:
  condition: |
    event_type == "ScheduledTaskCreate"
    AND task_command_path STARTSWITH_ANY ["C:\Users\Public\", "C:\ProgramData\", "C:\Windows\Temp\"]
false_positives:
- Software installers (allowlist by signed publisher)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
