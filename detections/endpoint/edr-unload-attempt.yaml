id: det-endpoint-011
name: EDR / AV Service Stopped or Unloaded
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'EDR / AV Service
  Stopped or Unloaded'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: edr
  service: service
detection:
  condition: |
    event_type == "ServiceStop"
    AND service_name IN ["WinDefend", "Sense", "MsMpEng", "CrowdStrike", "SentinelOne", "CarbonBlack"]
false_positives:
- Approved upgrade (must reference change ticket)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
