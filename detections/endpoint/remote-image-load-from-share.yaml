id: det-endpoint-020
name: DLL Loaded From Network Share
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'DLL Loaded From
  Network Share'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1574.002
- tlp.white
category: endpoint
log_source:
  product: edr
  service: image-load
detection:
  condition: |
    event_type == "ImageLoad"
    AND image_loaded_path STARTSWITH "\\"
false_positives:
- Centrally deployed plugin DLLs (allowlist server share)
playbook: tpl-malware-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
