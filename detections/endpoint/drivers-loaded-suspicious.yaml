id: det-endpoint-039
name: Driver Signed by Microsoft Loaded with Vulnerable Hash (BYOVD)
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Driver Signed by
  Microsoft Loaded with Vulnerable Hash (BYOVD)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1068
- tlp.white
category: endpoint
log_source:
  product: edr
  service: image-load
detection:
  condition: |
    event_type == "DriverLoad"
    AND driver_hash_in_byovd_list == true
false_positives:
- Allowlist legitimate vulnerable drivers under controlled compatibility tag (rare)
playbook: tpl-malware-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
