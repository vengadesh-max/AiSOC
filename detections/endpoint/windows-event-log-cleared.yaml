id: det-endpoint-013
name: Windows Event Log Cleared
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Windows Event Log
  Cleared'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1070.001
- tlp.white
category: endpoint
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id IN [1102, 104]
false_positives:
- Forensic export with explicit migration ticket
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
