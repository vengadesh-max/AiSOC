id: det-endpoint-022
name: Kernel Module Loaded from Non-Standard Path
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Kernel Module Loaded
  from Non-Standard Path'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1547.006
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    event_type == "MODULE"
    AND module_path NOT STARTSWITH "/lib/modules/"
false_positives:
- Custom kernel R&D (allowlist hosts)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
