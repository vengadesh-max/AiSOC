id: det-endpoint-005
name: PowerShell with Encoded Command and Bypass Flag
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'PowerShell with
  Encoded Command and Bypass Flag'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1059.001
- mitre.attack.t1027
- tlp.white
category: endpoint
log_source:
  product: edr
  service: process-create
detection:
  condition: |
    image_basename == "powershell.exe"
    AND command_line CONTAINS_ALL ["-enc", "-exec"]
    AND command_line CONTAINS_ANY ["bypass", "unrestricted"]
false_positives:
- Vendor management agents (allowlist by signed publisher)
playbook: tpl-malware-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
