id: det-endpoint-002
name: LSASS Memory Read by Untrusted Process
description: Detects when a process reads LSASS memory with access masks consistent with credential extraction
  (Mimikatz-style). LSASS holds plaintext password hashes and Kerberos tickets in memory; access from
  anything other than allowlisted security software is a strong compromise indicator.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1003.001
- tlp.white
category: endpoint
log_source:
  product: edr
  service: object-access
detection:
  condition: |
    target_image ENDSWITH "lsass.exe"
    AND granted_access_mask CONTAINS_ANY ["0x10", "0x1010", "0x1410", "0x1438", "0x143a", "0x1fffff"]
    AND source_image_not_in_allowlist == true
false_positives:
- Antivirus and security tools (allowlist by signed publisher)
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
