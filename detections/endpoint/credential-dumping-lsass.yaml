id: det-ep-003
name: Credential Dumping - LSASS Memory Access
description: >
  Detects attempts to read or dump memory from the Local Security Authority
  Subsystem Service (lsass.exe), a common technique used by tools like
  Mimikatz, ProcDump, and Task Manager to harvest credential material.
version: "1.0.0"
severity: critical
tags:
  - mitre.attack.t1003.001
  - tlp.white
category: endpoint
log_source:
  product: windows
  service: sysmon
detection:
  condition: |
    event_id == 10
    AND target_image CONTAINS "lsass.exe"
    AND granted_access IN [
      "0x1010", "0x1410", "0x147a", "0x143a",
      "0x1fffff", "0x1f3fff", "0x40", "0x1000",
      "0x0410"
    ]
    AND source_image NOT IN [
      "C:\\Windows\\System32\\werfault.exe",
      "C:\\Windows\\System32\\wermgr.exe",
      "C:\\Windows\\System32\\taskmgr.exe"
    ]
false_positives:
  - Authorised EDR agents reading LSASS for monitoring
  - Windows Defender Credential Guard
  - Legitimate crash dump creation by WER
playbook: tpl-credential-compromise
enabled: true
author: AiSOC
created: "2025-01-15"
modified: "2025-01-15"
