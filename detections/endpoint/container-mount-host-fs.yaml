id: det-endpoint-029
name: Container Mounts Host Filesystem at /host
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Container Mounts
  Host Filesystem at /host'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb == "create"
    AND object_resource == "pods"
    AND volume_path == "/"
false_positives:
- node-problem-detector / debug DaemonSets (allowlist namespace)
playbook: tpl-container-escape
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
