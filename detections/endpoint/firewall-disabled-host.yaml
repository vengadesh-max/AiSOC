id: det-endpoint-014
name: Host Firewall Disabled
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Host Firewall Disabled'.
  Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.004
- tlp.white
category: endpoint
log_source:
  product: edr
  service: process-create
detection:
  condition: |
    image_basename == "netsh.exe"
    AND command_line CONTAINS_ALL ["advfirewall", "set", "off"]
false_positives:
- Troubleshooting (must be ticketed)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
