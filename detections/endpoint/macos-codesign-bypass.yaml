id: det-endpoint-035
name: macOS Quarantine Attribute Stripped
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'macOS Quarantine
  Attribute Stripped'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1553.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    image_basename == "xattr"
    AND command_line CONTAINS_ANY ["-d com.apple.quarantine", "-c"]
false_positives:
- Developer build/test workflows (allowlist hostnames)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
