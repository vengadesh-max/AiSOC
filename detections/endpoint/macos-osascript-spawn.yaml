id: det-endpoint-033
name: Suspicious AppleScript Execution via osascript
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Suspicious AppleScript
  Execution via osascript'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1059.002
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    image_basename == "osascript"
    AND command_line CONTAINS_ANY ["do shell script", "with administrator privileges", "tell application "System Events""]
false_positives:
- Approved automation scripts (allowlist by hash)
playbook: tpl-malware-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
