id: det-endpoint-019
name: DLL Loaded with Invalid or Untrusted Signature
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'DLL Loaded with
  Invalid or Untrusted Signature'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1574.002
- tlp.white
category: endpoint
log_source:
  product: edr
  service: image-load
detection:
  condition: |
    event_type == "ImageLoad"
    AND image_basename_loaded ENDSWITH ".dll"
    AND signature_status IN ["Invalid", "Expired", "Untrusted"]
false_positives:
- Internal-only LOB DLLs (allowlist by hash)
playbook: tpl-malware-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
