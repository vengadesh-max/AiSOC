id: det-endpoint-026
name: Unix User Added with Login Shell
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Unix User Added
  with Login Shell'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1136.001
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    event_type == "USER_ADD"
    AND command_line CONTAINS_ANY ["/bin/bash", "/bin/sh"]
false_positives:
- Provisioning of new operator account (ticketed)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
