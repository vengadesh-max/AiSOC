id: det-endpoint-028
name: Container Launched with --privileged Flag
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Container Launched
  with --privileged Flag'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1611
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    image_basename IN ["docker", "podman"]
    AND command_line CONTAINS_ANY ["--privileged", "-v /:/host"]
false_positives:
- Allowlisted node-debug containers (kubectl-debug)
playbook: tpl-container-escape
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
