id: det-endpoint-016
name: AMSI Bypass via DLL or Reflective Patch
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'AMSI Bypass via
  DLL or Reflective Patch'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: endpoint
log_source:
  product: edr
  service: process-create
detection:
  condition: |
    image_basename == "powershell.exe"
    AND command_line CONTAINS_ANY ["AmsiUtils", "AmsiInitFailed", "amsi.dll"]
false_positives:
- Legitimate AMSI debugging in security R&D (allowlist users)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
