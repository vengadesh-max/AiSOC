id: det-endpoint-004
name: Office Application Spawns Shell or Scripting Engine
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Office Application
  Spawns Shell or Scripting Engine'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1059
- mitre.attack.t1204.002
- tlp.white
category: endpoint
log_source:
  product: edr
  service: process-create
detection:
  condition: |
    parent_image_basename IN ["winword.exe", "excel.exe", "powerpnt.exe", "outlook.exe"]
    AND image_basename IN ["powershell.exe", "cmd.exe", "wscript.exe", "cscript.exe", "mshta.exe"]
false_positives:
- Legitimate macros (rare; tag with macro-allowlist)
playbook: tpl-malware-execution
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
