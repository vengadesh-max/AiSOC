id: det-endpoint-034
name: macOS Gatekeeper Disabled
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'macOS Gatekeeper
  Disabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1553.001
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    image_basename == "spctl"
    AND command_line CONTAINS_ALL ["--master-disable"]
false_positives:
- Developer machines testing notarization (allowlist hostname)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
