id: det-endpoint-021
name: SUID/SGID Binary Created
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'SUID/SGID Binary
  Created'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1548.001
- tlp.white
category: endpoint
log_source:
  product: linux
  service: auditd
detection:
  condition: |
    event_type == "PATH"
    AND permissions HAS_ANY ["S_ISUID", "S_ISGID"]
false_positives:
- Package installers (must be triggered by dpkg/yum)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
