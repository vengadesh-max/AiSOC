id: det-endpoint-008
name: Persistence via Registry Run Key Write
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'Persistence via
  Registry Run Key Write'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1547.001
- tlp.white
category: endpoint
log_source:
  product: edr
  service: registry
detection:
  condition: |
    event_type == "RegistryValueSet"
    AND registry_path IN ["HKLM\Software\Microsoft\Windows\CurrentVersion\Run", "HKCU\Software\Microsoft\Windows\CurrentVersion\Run", "HKLM\Software\Microsoft\Windows\CurrentVersion\RunOnce"]
false_positives:
- Software installers (allowlist by signed publisher)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
