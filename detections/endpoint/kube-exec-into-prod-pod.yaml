id: det-endpoint-030
name: kubectl exec Into Production Namespace by Non-Operator
description: AiSOC v1 curated detection. Triggers on the endpoint signal described by 'kubectl exec Into
  Production Namespace by Non-Operator'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1609
- tlp.white
category: endpoint
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb == "create"
    AND object_resource == "pods"
    AND subresource == "exec"
    AND namespace == "production"
    AND user_role NOT IN ["operator", "admin"]
false_positives:
- Approved on-call investigation (must be on-call)
playbook: tpl-cloud-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
