id: det-network-016
name: SMB Null Session Attempt
description: AiSOC v1 curated detection. Triggers on the network signal described by 'SMB Null Session
  Attempt'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1135
- tlp.white
category: network
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 4624
    AND logon_type == 3
    AND user == "ANONYMOUS LOGON"
false_positives:
- Legacy applications relying on null sessions (decommission ticketed)
playbook: tpl-recon
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
