id: det-network-029
name: Kerberos Encryption Downgrade to RC4
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Kerberos Encryption
  Downgrade to RC4'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1558.003
- tlp.white
category: network
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 4768
    AND ticket_encryption IN ["RC4-HMAC", "0x17"]
false_positives:
- Legacy applications requiring RC4 (host_role=legacy tag)
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
