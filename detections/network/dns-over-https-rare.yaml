id: det-network-024
name: DNS-over-HTTPS to Non-Approved Resolver
description: AiSOC v1 curated detection. Triggers on the network signal described by 'DNS-over-HTTPS to
  Non-Approved Resolver'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1071.004
- tlp.white
category: network
log_source:
  product: proxy
  service: http
detection:
  condition: |
    dst_in_doh_allowlist == false
    AND method IN ["POST", "GET"]
    AND url_path ENDSWITH "/dns-query"
false_positives:
- Approved DoH providers (allowlist by hostname)
playbook: tpl-c2
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
