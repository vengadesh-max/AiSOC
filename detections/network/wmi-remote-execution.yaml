id: det-network-030
name: WMI Remote Process Creation From Workstation
description: AiSOC v1 curated detection. Triggers on the network signal described by 'WMI Remote Process
  Creation From Workstation'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1047
- mitre.attack.t1021.006
- tlp.white
category: network
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 4688
    AND process_command_line CONTAINS_ANY ["wmic /node:", "Invoke-WmiMethod -ComputerName"]
    AND src_role == "workstation"
false_positives:
- Approved admin scripting (allowlist users)
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
