id: det-network-022
name: RDP Logon Session With Concurrent Active Console Session
description: AiSOC v1 curated detection. Triggers on the network signal described by 'RDP Logon Session
  With Concurrent Active Console Session'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1021.001
- tlp.white
category: network
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 4624
    AND logon_type == 10
    AND concurrent_console_session == true
false_positives:
- IT helpdesk shadow sessions (must be ticketed)
playbook: tpl-account-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
