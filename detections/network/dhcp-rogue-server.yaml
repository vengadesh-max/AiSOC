id: det-network-011
name: Rogue DHCP Server Detected on LAN
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Rogue DHCP Server
  Detected on LAN'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1557
- tlp.white
category: network
log_source:
  product: ndr
  service: dhcp
detection:
  condition: |
    event_type == "DHCP_OFFER"
    AND src_mac_in_allowed_dhcp == false
false_positives:
- Approved network changes / new server bring-up (must be ticketed)
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
