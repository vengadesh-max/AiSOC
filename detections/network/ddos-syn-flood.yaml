id: det-network-019
name: SYN Flood Pattern Against Public Endpoint
description: AiSOC v1 curated detection. Triggers on the network signal described by 'SYN Flood Pattern
  Against Public Endpoint'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1498.001
- tlp.white
category: network
log_source:
  product: ndr
  service: flow
detection:
  condition: |
    tcp_flag == "SYN"
    AND syn_count_per_dst > 5000
    AND time_window_minutes < 1
false_positives:
- Legitimate burst (e.g., product launch)
playbook: tpl-ddos
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
