id: det-network-005
name: SMB Lateral Movement (Many ADMIN$ Connections)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'SMB Lateral Movement
  (Many ADMIN$ Connections)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1021.002
- tlp.white
category: network
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 5145
    AND share_name IN ["ADMIN$", "C$"]
    AND distinct_dst_per_src > 5
    AND time_window_minutes < 10
false_positives:
- Vulnerability scanners (must be allowlisted)
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
