id: det-network-015
name: Outbound Traffic to Rare/Suspicious ASN
description: AiSOC v1 curated detection. Triggers on the network signal described by 'Outbound Traffic
  to Rare/Suspicious ASN'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1071.001
- tlp.white
category: network
log_source:
  product: ndr
  service: flow
detection:
  condition: |
    dst_asn_seen_count < 5
    AND time_window_days > 30
false_positives:
- First-time use of legitimate hosting providers (must investigate)
playbook: tpl-c2
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
