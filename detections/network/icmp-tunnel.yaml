id: det-network-012
name: ICMP Tunneling Pattern (Large Payloads)
description: AiSOC v1 curated detection. Triggers on the network signal described by 'ICMP Tunneling Pattern
  (Large Payloads)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1095
- tlp.white
category: network
log_source:
  product: ndr
  service: flow
detection:
  condition: |
    protocol == "ICMP"
    AND avg_payload_bytes > 512
    AND packet_count > 500
    AND time_window_minutes < 30
false_positives:
- Network monitoring with large MTU echo (rare; allowlist)
playbook: tpl-c2
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
