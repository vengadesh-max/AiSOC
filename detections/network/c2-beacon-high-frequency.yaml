id: det-network-001
name: C2 Beacon Pattern (Periodic High-Frequency)
description: Detects highly periodic outbound network connections to a single destination, characteristic
  of command-and-control (C2) beaconing from implants. Combines both connection count and interval consistency
  to reduce false positives from telemetry agents.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1071.001
- tlp.white
category: network
log_source:
  product: ndr
  service: flow
detection:
  condition: |
    connection_count > 50
    AND interval_consistency > 0.85
    AND time_window_minutes < 60
false_positives:
- Telemetry / heartbeat agents to known endpoints (allowlist destination)
playbook: tpl-c2
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
