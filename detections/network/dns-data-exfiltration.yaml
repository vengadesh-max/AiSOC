id: det-network-002
name: DNS Tunneling / Exfiltration (High Length Subdomains)
description: Detects DNS tunnelling activity characterised by abnormally long subdomain labels and high
  query volume to a single parent domain. Common technique for covert data exfiltration that bypasses
  egress filtering on standard ports.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1048.003
- tlp.white
category: network
log_source:
  product: dns
  service: query
detection:
  condition: |
    avg_subdomain_len > 50
    AND query_count > 100
    AND time_window_minutes < 30
false_positives:
- DNSSEC and large CDN providers (allowlist parent domain)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
