id: det-network-006
name: RDP From Internet to Internal Host
description: AiSOC v1 curated detection. Triggers on the network signal described by 'RDP From Internet
  to Internal Host'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1133
- tlp.white
category: network
log_source:
  product: ndr
  service: flow
detection:
  condition: |
    src_ip_class == "internet"
    AND dst_port == 3389
    AND dst_ip_class == "internal"
false_positives:
- Approved jump-host (must be allowlisted)
playbook: tpl-cloud-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
