id: det-network-004
name: SSH Brute-Force From Internet
description: AiSOC v1 curated detection. Triggers on the network signal described by 'SSH Brute-Force
  From Internet'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1110.001
- tlp.white
category: network
log_source:
  product: linux
  service: auth
detection:
  condition: |
    event_type == "ssh-reject"
    AND outcome == "FAILURE"
    AND src_ip_class == "internet"
    AND fail_count > 30
    AND time_window_minutes < 10
false_positives:
- Misconfigured monitoring agent looping (rare)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
