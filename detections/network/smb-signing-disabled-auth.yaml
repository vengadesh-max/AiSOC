id: det-network-010
name: SMB Authentication Without Signing
description: AiSOC v1 curated detection. Triggers on the network signal described by 'SMB Authentication
  Without Signing'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1557.001
- tlp.white
category: network
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 5158
    AND smb_signing_enabled == false
false_positives:
- Legacy hosts (host_role=legacy tag) pending decommission
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
