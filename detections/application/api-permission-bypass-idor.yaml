id: det-application-020
name: API Returned Object Outside Caller's Tenant
description: AiSOC v1 curated detection. Triggers on the application signal described by 'API Returned
  Object Outside Caller's Tenant'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1212
- tlp.white
category: application
log_source:
  product: app
  service: audit
detection:
  condition: |
    event_type == "object.read"
    AND object_tenant_id_eq_caller_tenant_id == false
false_positives:
- Admin-impersonation operations (must originate from internal tooling)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
