id: det-application-022
name: Java/Python Deserialization Pattern
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Java/Python
  Deserialization Pattern'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1190
- tlp.white
category: application
log_source:
  product: waf
  service: http
detection:
  condition: |
    request_body PATTERN_MATCH_ANY ["rO0AB", "AAEAAAD", "_\$\$ND_FUNC\$\$_"]
false_positives:
- Legitimate serialization formats in trusted internal traffic (allowlist src)
playbook: tpl-webattack
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
