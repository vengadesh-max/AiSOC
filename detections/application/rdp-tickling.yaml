id: det-application-028
name: Outbound RDP Connection Initiated From Workstation to Internet
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Outbound RDP
  Connection Initiated From Workstation to Internet'. Watch the 1 documented false-positive case before
  tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1572
- tlp.white
category: application
log_source:
  product: ndr
  service: flow
detection:
  condition: |
    src_role == "workstation"
    AND dst_port == 3389
    AND dst_ip_class == "internet"
false_positives:
- Allowlisted IT support tooling (rare)
playbook: tpl-account-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
