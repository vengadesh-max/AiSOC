id: det-application-007
name: OS Command Injection in HTTP Parameter
description: AiSOC v1 curated detection. Triggers on the application signal described by 'OS Command Injection
  in HTTP Parameter'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1059
- tlp.white
category: application
log_source:
  product: waf
  service: http
detection:
  condition: |
    request_uri PATTERN_MATCH_ANY [";\s?cat /etc/passwd", "\| nc ", "&& curl ", "`id`", "\$\(whoami\)"]
false_positives:
- Allowlisted security tooling pen-tests (src allowlist)
playbook: tpl-webattack
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
