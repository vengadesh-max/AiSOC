id: det-application-017
name: Internal Repository Made Public
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Internal Repository
  Made Public'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1530
- tlp.white
category: application
log_source:
  product: github
  service: audit
detection:
  condition: |
    action == "repo.visibility_change"
    AND visibility == "public"
false_positives:
- OSS publication (must reference release ticket)
playbook: tpl-data-exposure
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
