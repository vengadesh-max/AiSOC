id: det-application-002
name: Cross-Site Scripting Attempt
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Cross-Site Scripting
  Attempt'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1190
- tlp.white
category: application
log_source:
  product: waf
  service: http
detection:
  condition: |
    request_uri PATTERN_MATCH_ANY ["<script>", "javascript:", "onerror=", "<svg/onload=", "document.cookie"]
false_positives:
- Encoded HTML in legitimate CMS posts (encode-on-output)
playbook: tpl-webattack
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
