id: det-application-026
name: Marketplace App Installed With Broad Scopes
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Marketplace
  App Installed With Broad Scopes'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098.001
- tlp.white
category: application
log_source:
  product: google-workspace
  service: audit
detection:
  condition: |
    event_type == "marketplace.app.installed"
    AND scope_set CONTAINS_ANY ["mail.full", "drive.full", "directory.readwrite"]
false_positives:
- IT-managed installs (allowlist publisher)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
