id: det-application-015
name: Secret-Pattern Match in CI Job Log
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Secret-Pattern
  Match in CI Job Log'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1552.001
- tlp.white
category: application
log_source:
  product: ci
  service: logs
detection:
  condition: |
    log_line PATTERN_MATCH_ANY ["AKIA[0-9A-Z]{16}", "ghp_[A-Za-z0-9]{36}", "-----BEGIN PRIVATE KEY-----"]
false_positives:
- Test fixtures with synthetic-looking secrets (must be tagged)
playbook: tpl-secret-leak
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
