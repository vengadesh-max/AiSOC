id: det-application-027
name: Process Reading Browser Login Database
description: AiSOC v1 curated detection. Triggers on the application signal described by 'Process Reading
  Browser Login Database'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1555.003
- tlp.white
category: application
log_source:
  product: edr
  service: file-read
detection:
  condition: |
    event_type == "FileRead"
    AND file_path ENDSWITH_ANY ["Login Data", "logins.json", "key3.db", "key4.db"]
false_positives:
- Browser itself (allowlist by image-path of actual browser binary)
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
