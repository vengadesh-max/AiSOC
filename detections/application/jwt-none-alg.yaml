id: det-application-012
name: JWT With alg=none in Authorization Header
description: AiSOC v1 curated detection. Triggers on the application signal described by 'JWT With alg=none
  in Authorization Header'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1078
- tlp.white
category: application
log_source:
  product: waf
  service: http
detection:
  condition: |
    authorization_header_jwt_alg == "none"
false_positives:
- Internal-only debug paths (must require staging-only path)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
