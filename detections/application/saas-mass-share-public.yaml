id: det-application-024
name: SaaS File Mass Public-Share by Single User
description: AiSOC v1 curated detection. Triggers on the application signal described by 'SaaS File Mass
  Public-Share by Single User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: application
log_source:
  product: google-workspace
  service: drive
detection:
  condition: |
    event_type == "drive.acl.change"
    AND share_visibility == "public"
    AND file_count_per_user > 10
    AND time_window_minutes < 30
false_positives:
- Approved customer-share workflows (allowlist user)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
