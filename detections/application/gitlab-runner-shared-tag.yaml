id: det-application-023
name: GitLab Runner Registered as Shared Without Approval
description: AiSOC v1 curated detection. Triggers on the application signal described by 'GitLab Runner
  Registered as Shared Without Approval'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1525
- tlp.white
category: application
log_source:
  product: gitlab
  service: audit
detection:
  condition: |
    event_type == "runners.register"
    AND runner_scope == "shared"
false_positives:
- Approved org-shared runner (must be from infra team)
playbook: tpl-supply-chain
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
