id: det-data-exfil-020
name: Secrets Manager Bulk Fetch by Human Principal
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'Secrets Manager
  Bulk Fetch by Human Principal'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1555
- mitre.attack.t1530
- tlp.white
category: data-exfil
log_source:
  product: cloud
  service: secrets
detection:
  condition: |
    event_type == "GetSecretValue"
    AND secret_count_per_principal > 25
    AND principal_type == "human"
    AND time_window_minutes < 10
false_positives:
- Allowlisted ops break-glass (must be on-call)
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
