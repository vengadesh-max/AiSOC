id: det-data-exfil-007
name: Snowflake Large Result-Set Download by Non-Service Account
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'Snowflake Large
  Result-Set Download by Non-Service Account'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1530
- tlp.white
category: data-exfil
log_source:
  product: snowflake
  service: queryhistory
detection:
  condition: |
    event_type == "QUERY"
    AND rows_produced > 1000000
    AND user_type == "human"
false_positives:
- Allowlisted analyst-team queries (must reference query-tag)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
