id: det-data-exfil-011
name: Outbound Paste to Public Pastebin / Gist
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'Outbound Paste
  to Public Pastebin / Gist'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1567
- tlp.white
category: data-exfil
log_source:
  product: proxy
  service: http
detection:
  condition: |
    method == "POST"
    AND dst_in_paste_list == true
    AND bytes_out > 1000
false_positives:
- Engineering posting OSS code (allowlist users)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
