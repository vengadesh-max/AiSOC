id: det-data-exfil-005
name: SaaS File Shared to External Domain
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'SaaS File Shared
  to External Domain'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1567
- tlp.white
category: data-exfil
log_source:
  product: google-workspace
  service: drive
detection:
  condition: |
    event_type == "drive.acl.change"
    AND share_target_external == true
    AND share_target_domain_in_allowlist == false
false_positives:
- Approved B2B partners (allowlisted)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
