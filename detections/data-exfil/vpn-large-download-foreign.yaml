id: det-data-exfil-019
name: VPN Tunnel Large Download from Foreign Country
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'VPN Tunnel Large
  Download from Foreign Country'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1041
- tlp.white
category: data-exfil
log_source:
  product: vpn
  service: session
detection:
  condition: |
    src_country_in_allowlist == false
    AND bytes_in > 200000000
false_positives:
- Approved business travel (must be ticketed)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
