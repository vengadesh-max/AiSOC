id: det-data-exfil-018
name: Container Image Mass Export to External Registry
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'Container Image
  Mass Export to External Registry'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1567
- tlp.white
category: data-exfil
log_source:
  product: cloud
  service: registry
detection:
  condition: |
    event_type == "image.push"
    AND dst_registry_in_allowlist == false
    AND image_count_per_principal > 5
    AND time_window_minutes < 30
false_positives:
- Approved OSS image releases (allowlist destination)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
