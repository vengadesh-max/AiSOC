id: det-data-exfil-017
name: Backup Export to Non-Allowlisted Destination
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'Backup Export
  to Non-Allowlisted Destination'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1567
- tlp.white
category: data-exfil
log_source:
  product: cloud
  service: backup
detection:
  condition: |
    event_type == "Backup.Export"
    AND backup_dst_in_allowlist == false
false_positives:
- Approved DR drill (must be ticketed)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
