id: det-data-exfil-013
name: Mass Print Job From Confidential Document Repository
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'Mass Print Job
  From Confidential Document Repository'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1052
- tlp.white
category: data-exfil
log_source:
  product: windows
  service: print
detection:
  condition: |
    event_id == 307
    AND page_count_per_user > 500
    AND doc_classification == "confidential"
    AND time_window_hours < 1
false_positives:
- Approved bulk-print operations (must be ticketed)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
