id: det-data-exfil-001
name: Large Outbound Transfer to Personal Cloud Storage
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'Large Outbound
  Transfer to Personal Cloud Storage'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1567.002
- tlp.white
category: data-exfil
log_source:
  product: proxy
  service: http
detection:
  condition: |
    dst_in_personal_cloud_list == true
    AND bytes_out > 100000000
    AND time_window_minutes < 60
false_positives:
- Allowlisted business cloud-storage backups (rare)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
