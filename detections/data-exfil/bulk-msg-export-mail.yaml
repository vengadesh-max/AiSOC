id: det-data-exfil-015
name: Bulk Mailbox Export From M365 Compliance Center
description: AiSOC v1 curated detection. Triggers on the data-exfil signal described by 'Bulk Mailbox
  Export From M365 Compliance Center'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1114.002
- tlp.white
category: data-exfil
log_source:
  product: azure
  service: azuread-audit
detection:
  condition: |
    operation_name == "Search-Mailbox -DeleteContent:$false -TargetMailbox"
false_positives:
- Approved eDiscovery operations (must be ticketed)
playbook: tpl-data-exfil
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
