id: det-identity-031
name: Active Directory Replication Request from Non-Domain-Controller
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Active Directory
  Replication Request from Non-Domain-Controller'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1003.006
- tlp.white
category: identity
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 4662
    AND operation_type CONTAINS "DS-Replication-Get-Changes"
    AND source_role NOT IN ["domain_controller"]
false_positives:
- Approved replication agents (azure ad connect; explicit allowlist)
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
