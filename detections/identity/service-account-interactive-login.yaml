id: det-identity-011
name: Service Account Used for Interactive Login
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Service Account
  Used for Interactive Login'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.004
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.session.start"
    AND user_type == "service_account"
    AND session_type == "interactive"
false_positives:
- Service account testing during onboarding (must be ticketed)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
