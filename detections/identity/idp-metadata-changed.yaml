id: det-identity-038
name: IDP Metadata or Signing Cert Changed
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'IDP Metadata or
  Signing Cert Changed'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type IN ["app.idp.update_signing_certificate", "app.idp.update_metadata"]
false_positives:
- Cert rotation (must be paired with rotation calendar)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
