id: det-identity-027
name: Privileged Account Deleted
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Privileged Account
  Deleted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1531
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.lifecycle.deactivate"
    AND target_user_role IN ["admin", "owner"]
false_positives:
- Offboarding (must reference HR ticket)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
