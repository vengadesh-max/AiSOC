id: det-identity-022
name: Domain Password Policy Weakened
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Domain Password
  Policy Weakened'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1556
- tlp.white
category: identity
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id IN [4739, 4738]
    AND policy_change IN ["min-length-decreased", "complexity-disabled", "lockout-disabled"]
false_positives:
- Approved policy refactor (ticketed, paired with rotation)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
