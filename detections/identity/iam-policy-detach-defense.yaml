id: det-identity-021
name: Defensive IAM Policy Detached
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Defensive IAM Policy
  Detached'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1562.008
- tlp.white
category: identity
log_source:
  product: aws
  service: cloudtrail
detection:
  condition: |
    event_name IN ["DetachUserPolicy", "DetachRolePolicy"]
    AND policy_name CONTAINS_ANY ["DefaultDeny", "GuardrailDeny", "OrgDeny"]
false_positives:
- Policy migration during Org SCP refactor (ticket required)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
