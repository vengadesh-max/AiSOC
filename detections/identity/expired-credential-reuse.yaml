id: det-identity-010
name: Authentication with Expired Credential
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Authentication
  with Expired Credential'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1110
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.session.start"
    AND credential_state == "EXPIRED"
false_positives:
- Cached credentials in legacy automation (rotation grace period)
playbook: tpl-account-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
