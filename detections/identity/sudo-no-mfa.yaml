id: det-identity-018
name: Sudo Used Without MFA
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Sudo Used Without
  MFA'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1548.003
- tlp.white
category: identity
log_source:
  product: linux
  service: sudo
detection:
  condition: |
    event_type == "sudo-use"
    AND mfa_verified == false
false_positives:
- Hosts pending MFA rollout (host_role=legacy tag required)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
