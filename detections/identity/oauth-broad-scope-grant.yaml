id: det-identity-023
name: OAuth App Granted Broad Scopes by User
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'OAuth App Granted
  Broad Scopes by User'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098.001
- tlp.white
category: identity
log_source:
  product: google-workspace
  service: audit
detection:
  condition: |
    event_type == "oauth.token.grant"
    AND scope_set CONTAINS_ANY ["mail.readwrite", "drive.full", "admin.directory"]
false_positives:
- IT-managed integrations (publisher in allowlist)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
