id: det-identity-036
name: SAML Response with Mismatched Issuer or Future-Dated NotBefore
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'SAML Response with
  Mismatched Issuer or Future-Dated NotBefore'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1606.002
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.authentication.sso"
    AND ANY OF:
      - issuer_valid == false
      - notbefore_in_future == true
false_positives:
- Clock-skew between IDP and SP (rare; <2min)
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
