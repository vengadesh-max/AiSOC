id: det-identity-008
name: MFA Push Bombing (MFA Fatigue)
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'MFA Push Bombing
  (MFA Fatigue)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1621
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.mfa.factor.push"
    AND mfa_push_count > 6
    AND time_window_minutes < 5
false_positives:
- User retrying after a missed prompt (typically 2-3 retries)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
