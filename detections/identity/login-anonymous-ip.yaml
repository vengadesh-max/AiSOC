id: det-identity-004
name: Login from Tor / Anonymous Proxy
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Login from Tor
  / Anonymous Proxy'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.session.start"
    AND ip_anonymizer == true
false_positives:
- Researchers / red team (tagged research-account)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
