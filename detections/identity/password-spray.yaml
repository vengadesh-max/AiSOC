id: det-identity-003
name: Password Spray Across Many Users from Single IP
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Password Spray
  Across Many Users from Single IP'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1110.003
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.session.start"
    AND outcome == "FAILURE"
    AND distinct_users_per_ip > 30
    AND time_window_minutes < 30
false_positives:
- Penetration tests (must be ticketed)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
