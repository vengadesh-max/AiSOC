id: det-identity-035
name: Silver Ticket Indicator (Service Ticket Without TGS Hit)
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Silver Ticket Indicator
  (Service Ticket Without TGS Hit)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1558.002
- tlp.white
category: identity
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 4624
    AND logon_type == 3
    AND tgs_event_seen == false
false_positives:
- Cached TGT reuse outside log retention window
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
