id: det-identity-025
name: Persistent Session Token Reused from New Device Fingerprint
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Persistent Session
  Token Reused from New Device Fingerprint'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1550.004
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.session.access_token"
    AND device_fingerprint_seen_before == false
    AND session_age_hours > 8
false_positives:
- Browser update changing fingerprint (must be paired with consistent IP)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
