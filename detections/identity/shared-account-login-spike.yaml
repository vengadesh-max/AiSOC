id: det-identity-014
name: Shared Account Login Spike (Distinct IPs)
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Shared Account
  Login Spike (Distinct IPs)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1078
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.session.start"
    AND distinct_ip_count_per_user > 5
    AND time_window_minutes < 10
false_positives:
- Shared corporate workstation (multi-user)
playbook: tpl-account-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
