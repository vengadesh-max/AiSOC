id: det-identity-012
name: Root SSH Login on Production Host
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Root SSH Login
  on Production Host'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.001
- tlp.white
category: identity
log_source:
  product: linux
  service: auth
detection:
  condition: |
    event_type == "ssh-accept"
    AND user == "root"
    AND host_role == "production"
false_positives:
- Disaster recovery break-glass (must be ticketed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
