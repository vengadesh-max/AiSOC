id: det-identity-029
name: Admin Password Reset Initiated by Self via Self-Service
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Admin Password
  Reset Initiated by Self via Self-Service'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.account.reset_password"
    AND reset_method == "self-service"
    AND user_role == "admin"
false_positives:
- Forgotten-password flow with strong second factor (rare for admins)
playbook: tpl-account-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
