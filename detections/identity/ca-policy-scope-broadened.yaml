id: det-identity-039
name: Conditional Access Policy Scope Broadened (Less Restrictive)
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Conditional Access
  Policy Scope Broadened (Less Restrictive)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1562.001
- tlp.white
category: identity
log_source:
  product: azure
  service: azuread-audit
detection:
  condition: |
    operation_name == "Update conditional access policy"
    AND policy_change IN ["scope-expanded", "exclusion-added"]
false_positives:
- Onboarding new application to existing policy (ticketed)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
