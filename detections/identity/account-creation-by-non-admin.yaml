id: det-identity-026
name: User Account Creation by Non-Admin Principal
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'User Account Creation
  by Non-Admin Principal'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1136.001
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.lifecycle.create"
    AND actor_role NOT IN ["admin", "user_admin"]
false_positives:
- Self-service guest invite (must require sponsor)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
