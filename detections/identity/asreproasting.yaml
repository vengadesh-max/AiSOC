id: det-identity-033
name: AS-REP Roasting (Account with Pre-Auth Disabled)
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'AS-REP Roasting
  (Account with Pre-Auth Disabled)'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1558.004
- tlp.white
category: identity
log_source:
  product: windows
  service: security
detection:
  condition: |
    event_id == 4768
    AND preauth_required == false
false_positives:
- Legacy unix/krb5-style accounts with explicit allowlist
playbook: tpl-credential-theft
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
