id: det-identity-016
name: Privileged Role Assignment
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Privileged Role
  Assignment'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.role.add"
    AND role_name IN ["admin", "owner", "global_admin"]
false_positives:
- Quarterly access review (ticketed)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
