id: det-identity-009
name: MFA Requirement Removed from User Policy
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'MFA Requirement
  Removed from User Policy'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1556.006
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "policy.lifecycle.update"
    AND policy_change_field == "mfa_required:false"
false_positives:
- Migration to passkey-only (must reference replacement policy)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
