id: det-identity-028
name: Disabled Account Re-enabled
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Disabled Account
  Re-enabled'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1098
- tlp.white
category: identity
log_source:
  product: okta
  service: system-log
detection:
  condition: |
    event_type == "user.lifecycle.activate"
    AND previous_state == "DISABLED"
false_positives:
- Re-hire (must reference HR ticket)
playbook: tpl-account-anomaly
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
