id: det-identity-013
name: Login with Vendor Default Credentials
description: AiSOC v1 curated detection. Triggers on the identity signal described by 'Login with Vendor
  Default Credentials'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1078.001
- tlp.white
category: identity
log_source:
  product: linux
  service: auth
detection:
  condition: |
    event_type == "ssh-accept"
    AND user_in_default_list == true
    AND outcome == "SUCCESS"
false_positives:
- Lab/sandbox hosts (must not be production-tagged)
playbook: tpl-account-compromise
enabled: true
author: AiSOC
created: '2026-05-03'
modified: '2026-05-03'
