<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>AiSOC mark</title>
  <defs>
    <linearGradient id="aisocMarkOutline" x1="32" y1="8" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="aisocMarkBody" x1="32" y1="14" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5f5"/>
    </linearGradient>
    <radialGradient id="aisocMarkSpark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <!-- Outer shield -->
  <path d="M32 6 L54 18 L54 42 L32 58 L10 42 L10 18 Z"
        fill="none"
        stroke="url(#aisocMarkOutline)"
        stroke-width="3"
        stroke-linejoin="round"/>
  <!-- Inner shield glow -->
  <path d="M32 12 L48 21 L48 39 L32 50 L16 39 L16 21 Z"
        fill="rgba(59,130,246,0.08)"
        stroke="url(#aisocMarkOutline)"
        stroke-width="1.2"
        stroke-linejoin="round"
        opacity="0.7"/>
  <!-- Stylized "A" -->
  <path d="M21 44 L32 16 L43 44 M25.5 35.5 L38.5 35.5"
        fill="none"
        stroke="url(#aisocMarkBody)"
        stroke-width="3.6"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- AI spark -->
  <circle cx="46" cy="18" r="4" fill="url(#aisocMarkSpark)"/>
  <circle cx="46" cy="18" r="6.5" fill="none" stroke="rgba(251,191,36,0.4)" stroke-width="1.4"/>
</svg>
