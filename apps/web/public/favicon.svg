  <!-- "A" silhouette -->
  <path d="M22 42 L32 18 L42 42 M26 35 L38 35"
        fill="none"
        stroke="url(#aisocFavMark)"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- AI spark -->
  <circle cx="44" cy="20" r="3.4" fill="#fbbf24"/>
  <circle cx="44" cy="20" r="3.4" fill="none" stroke="rgba(251,191,36,0.55)" stroke-width="2.4"/>
</svg>
