# fly.toml — AiSOC web app (Fly.io)
#
# This file mirrors the live configuration of the `aisoc-demo-web` Fly app.
# It is the source of truth for the web app's Fly deployment.
#
# Secrets are NEVER stored here. They are managed server-side via:
#   flyctl secrets set KEY=value -a aisoc-demo-web
#   flyctl secrets list -a aisoc-demo-web
#
# Auto-deploy: any push to `main` that touches `apps/web/**`,
# `packages/types/**`, `packages/ui/**`, `pnpm-lock.yaml`,
# `pnpm-workspace.yaml`, or `.github/workflows/deploy-web.yml`
# triggers `.github/workflows/deploy-web.yml`, which runs
# `flyctl deploy --remote-only` against this file.
#
# Manual deploy (from repo root):
#   flyctl deploy --remote-only \
#     --dockerfile apps/web/Dockerfile \
#     --config apps/web/fly.toml \
#     -a aisoc-demo-web .
#
# See https://fly.io/docs/reference/configuration/ for syntax reference.

app = 'aisoc-demo-web'
primary_region = 'iad'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    AGENTS_URL = 'http://aisoc-demo-agents.internal:8084'
    API_URL = 'http://aisoc-demo-api.internal:8000'
    NEXT_PUBLIC_API_URL = 'https://api.tryaisoc.com'
    NEXT_PUBLIC_WS_URL = 'wss://ws.tryaisoc.com'
    REALTIME_URL = 'http://aisoc-demo-realtime.internal:4000'

[env]
  AGENTS_URL = 'http://aisoc-demo-agents.internal:8084'
  API_URL = 'http://aisoc-demo-api.internal:8000'
  NEXT_PUBLIC_API_URL = 'https://api.tryaisoc.com'
  NEXT_PUBLIC_DEMO_BANNER = 'Demo data resets daily at 00:00 UTC. All write actions are disabled.'
  NEXT_PUBLIC_DEMO_DEEPLINK = '/cases/INC-001?tab=ledger'
  NEXT_PUBLIC_DEMO_MODE = 'true'
  NEXT_PUBLIC_DEMO_RESET = 'daily-utc-0000'
  NEXT_PUBLIC_WS_URL = 'wss://ws.tryaisoc.com'
  NODE_ENV = 'production'
  PORT = '3000'
  REALTIME_URL = 'http://aisoc-demo-realtime.internal:4000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory_mb = 1024
