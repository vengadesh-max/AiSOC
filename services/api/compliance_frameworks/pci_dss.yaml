framework: pci_dss
name: PCI DSS v4.0
description: Payment Card Industry Data Security Standard for protecting cardholder data
controls:
  - control_id: "1.1"
    category: "Network Security Controls"
    title: "Processes and mechanisms for network security controls are defined and understood"
    description: "All security policies and operational procedures that are identified in Requirement 1 are documented, kept up to date, in use, and known to all affected parties."
  - control_id: "1.2"
    category: "Network Security Controls"
    title: "Network access controls are configured and maintained"
    description: "Network access controls are implemented to control access to systems in the cardholder data environment."
  - control_id: "2.1"
    category: "Secure Configurations"
    title: "System components are protected from known vulnerabilities"
    description: "Security features and system configurations are set up to prevent unauthorized access."
  - control_id: "3.1"
    category: "Cardholder Data Protection"
    title: "Processes for protecting stored account data are defined and understood"
    description: "All security policies and operational procedures for protecting stored account data are documented."
  - control_id: "4.1"
    category: "Strong Cryptography in Transit"
    title: "Strong cryptography is used to safeguard PAN during transmission"
    description: "Strong cryptography is used to safeguard primary account number during transmission over open, public networks."
  - control_id: "5.1"
    category: "Malware Protection"
    title: "Processes and mechanisms to protect against malware are defined and understood"
    description: "Anti-malware solutions and processes are deployed to protect all system components from malware."
  - control_id: "6.1"
    category: "Secure Systems and Software"
    title: "Processes for protecting bespoke/custom software are defined and understood"
    description: "Security vulnerabilities are identified and addressed in software development processes."
  - control_id: "7.1"
    category: "Access Control"
    title: "Processes for implementing access controls are defined and documented"
    description: "Access to system components and cardholder data is limited to only those individuals whose job requires such access."
  - control_id: "8.1"
    category: "User Identification and Authentication"
    title: "Processes for implementing user identification and authentication are defined and documented"
    description: "User identification and authentication are managed throughout the account lifecycle."
  - control_id: "8.2"
    category: "User Identification and Authentication"
    title: "All user IDs and authentication credentials are managed"
    description: "User IDs and authentication credentials for non-consumer users and administrators are strictly managed."
  - control_id: "9.1"
    category: "Physical Access Restriction"
    title: "Processes for protecting cardholder data with physical access controls are defined and understood"
    description: "Physical access controls are implemented for all system components in the CDE."
  - control_id: "10.1"
    category: "Log and Monitor All Access"
    title: "Processes for logging and monitoring are defined and understood"
    description: "All access to system components and cardholder data is logged and monitored."
  - control_id: "10.2"
    category: "Log and Monitor All Access"
    title: "Audit logs are implemented to support the detection of anomalies"
    description: "Audit logs that capture all individual user access to cardholder data are implemented."
  - control_id: "10.7"
    category: "Log and Monitor All Access"
    title: "Failures of critical security controls are detected, reported, and responded to"
    description: "Failures of critical security controls are detected, alerted, and addressed promptly."
  - control_id: "11.1"
    category: "Testing Security"
    title: "Processes for regular testing of security systems and networks are defined and understood"
    description: "Security of systems and networks is tested regularly."
  - control_id: "12.1"
    category: "Organization Information Security Policy"
    title: "A comprehensive information security policy is known and communicated to all personnel"
    description: "A comprehensive information security policy is established, published, maintained, and disseminated."
