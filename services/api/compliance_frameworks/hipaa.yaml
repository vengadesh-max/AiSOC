framework: hipaa
name: HIPAA Security Rule
description: Health Insurance Portability and Accountability Act security standards for protecting electronic protected health information (ePHI)
controls:
  - control_id: "164.308(a)(1)"
    category: "Administrative Safeguards"
    title: "Security management process"
    description: "Implement policies and procedures to prevent, detect, contain, and correct security violations."
  - control_id: "164.308(a)(2)"
    category: "Administrative Safeguards"
    title: "Assigned security responsibility"
    description: "Identify the security official who is responsible for the development and implementation of the security policies and procedures."
  - control_id: "164.308(a)(3)"
    category: "Administrative Safeguards"
    title: "Workforce security"
    description: "Implement policies and procedures to ensure that all members of its workforce have appropriate access to ePHI."
  - control_id: "164.308(a)(4)"
    category: "Administrative Safeguards"
    title: "Information access management"
    description: "Implement policies and procedures for authorizing access to ePHI."
  - control_id: "164.308(a)(5)"
    category: "Administrative Safeguards"
    title: "Security awareness and training"
    description: "Implement a security awareness and training program for all members of its workforce."
  - control_id: "164.308(a)(6)"
    category: "Administrative Safeguards"
    title: "Security incident procedures"
    description: "Implement policies and procedures to address security incidents."
  - control_id: "164.308(a)(7)"
    category: "Administrative Safeguards"
    title: "Contingency plan"
    description: "Establish (and implement as needed) policies and procedures for responding to an emergency or other occurrence."
  - control_id: "164.308(a)(8)"
    category: "Administrative Safeguards"
    title: "Evaluation"
    description: "Perform a periodic technical and non-technical evaluation of the security posture."
  - control_id: "164.310(a)(1)"
    category: "Physical Safeguards"
    title: "Facility access controls"
    description: "Implement policies and procedures to limit physical access to its electronic information systems."
  - control_id: "164.310(b)"
    category: "Physical Safeguards"
    title: "Workstation use"
    description: "Implement policies and procedures that specify the proper functions to be performed on workstations."
  - control_id: "164.310(d)(1)"
    category: "Physical Safeguards"
    title: "Device and media controls"
    description: "Implement policies and procedures that govern the receipt and removal of hardware and electronic media."
  - control_id: "164.312(a)(1)"
    category: "Technical Safeguards"
    title: "Access control"
    description: "Implement technical policies and procedures for electronic information systems that allow access only to those persons or software programs that have been granted access rights."
  - control_id: "164.312(b)"
    category: "Technical Safeguards"
    title: "Audit controls"
    description: "Implement hardware, software, and/or procedural mechanisms that record and examine activity in information systems that contain or use ePHI."
  - control_id: "164.312(c)(1)"
    category: "Technical Safeguards"
    title: "Integrity"
    description: "Implement policies and procedures to protect ePHI from improper alteration or destruction."
  - control_id: "164.312(d)"
    category: "Technical Safeguards"
    title: "Person or entity authentication"
    description: "Implement procedures to verify that a person or entity seeking access to ePHI is the one claimed."
  - control_id: "164.312(e)(1)"
    category: "Technical Safeguards"
    title: "Transmission security"
    description: "Implement technical security measures to guard against unauthorized access to ePHI that is being transmitted over an electronic communications network."
