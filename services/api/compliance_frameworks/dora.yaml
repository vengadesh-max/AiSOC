framework: dora
name: DORA (Digital Operational Resilience Act)
description: EU regulation on digital operational resilience for the financial sector
controls:
  - control_id: "Art.5"
    category: "ICT Risk Management"
    title: "ICT risk management framework"
    description: "Financial entities shall have in place a sound, comprehensive and well-documented ICT risk management framework."
  - control_id: "Art.6"
    category: "ICT Risk Management"
    title: "ICT risk management systems, protocols and tools"
    description: "Financial entities shall use and maintain updated ICT systems, protocols and tools that are appropriate, reliable, and have sufficient capacity."
  - control_id: "Art.7"
    category: "ICT Risk Management"
    title: "ICT systems, protocols and tools"
    description: "Financial entities shall use ICT systems, protocols and tools that are adequate and proportionate to the size of their operations."
  - control_id: "Art.8"
    category: "ICT Risk Management"
    title: "Identification of ICT risks"
    description: "Financial entities shall identify, classify and adequately document all ICT supported business functions, roles and responsibilities."
  - control_id: "Art.9"
    category: "ICT Risk Management"
    title: "Protection and prevention of ICT risks"
    description: "Financial entities shall continuously monitor and control ICT security and functioning of ICT systems and tools."
  - control_id: "Art.10"
    category: "ICT Risk Management"
    title: "Detection of anomalous activities"
    description: "Financial entities shall have in place mechanisms to promptly detect anomalous activities."
  - control_id: "Art.11"
    category: "ICT Risk Management"
    title: "Response and recovery"
    description: "Financial entities shall put in place a comprehensive ICT business continuity policy as part of their ICT risk management framework."
  - control_id: "Art.12"
    category: "ICT Risk Management"
    title: "Backup policies and restoration and recovery procedures"
    description: "For the purpose of ensuring the restoration of ICT systems and data, financial entities shall develop and document backup policies and procedures."
  - control_id: "Art.13"
    category: "ICT Risk Management"
    title: "Learning and evolving"
    description: "Financial entities shall have the capability to gather information on vulnerabilities and cyber threats and review after ICT-related incidents."
  - control_id: "Art.17"
    category: "ICT Incident Management"
    title: "ICT-related incident management process"
    description: "Financial entities shall define, establish and implement an ICT-related incident management process to detect, manage and notify ICT-related incidents."
  - control_id: "Art.18"
    category: "ICT Incident Management"
    title: "Classification of ICT-related incidents"
    description: "Financial entities shall classify ICT-related incidents and determine their impact based on specified criteria."
  - control_id: "Art.19"
    category: "ICT Incident Management"
    title: "Reporting of major ICT-related incidents"
    description: "Financial entities shall report major ICT-related incidents to the relevant competent authority."
  - control_id: "Art.24"
    category: "Digital Operational Resilience Testing"
    title: "General requirements for digital operational resilience testing"
    description: "Financial entities shall establish, maintain and review a sound and comprehensive digital operational resilience testing programme."
  - control_id: "Art.25"
    category: "Digital Operational Resilience Testing"
    title: "Testing of ICT tools and systems"
    description: "Financial entities shall test ICT tools and systems using threat-led penetration testing."
  - control_id: "Art.28"
    category: "ICT Third-Party Risk Management"
    title: "General principles of ICT third-party risk management"
    description: "Financial entities shall manage ICT third-party risk as an integral component of ICT risk within their ICT risk management framework."
  - control_id: "Art.30"
    category: "ICT Third-Party Risk Management"
    title: "Key contractual provisions"
    description: "Rights and obligations of the financial entity and of the ICT third-party service provider shall be clearly allocated and set out in writing."
