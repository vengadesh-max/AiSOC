framework: nist_csf
name: NIST Cybersecurity Framework 2.0
description: Framework for improving critical infrastructure cybersecurity (Govern, Identify, Protect, Detect, Respond, Recover)
controls:
  - control_id: "GV.OC-01"
    category: "Govern - Organizational Context"
    title: "Mission and stakeholder expectations"
    description: "The organizational mission is understood and informs cybersecurity risk management."
  - control_id: "GV.RM-01"
    category: "Govern - Risk Management Strategy"
    title: "Risk management objectives"
    description: "Risk management objectives are established and agreed to by organizational stakeholders."
  - control_id: "GV.PO-01"
    category: "Govern - Policy"
    title: "Cybersecurity policy"
    description: "Policy for managing cybersecurity risks is established based on organizational context."
  - control_id: "ID.AM-01"
    category: "Identify - Asset Management"
    title: "Inventories of hardware assets"
    description: "Inventories of hardware managed by the organization are maintained."
  - control_id: "ID.AM-02"
    category: "Identify - Asset Management"
    title: "Inventories of software assets"
    description: "Inventories of software, services, and systems managed by the organization are maintained."
  - control_id: "ID.RA-01"
    category: "Identify - Risk Assessment"
    title: "Vulnerabilities are identified"
    description: "Vulnerabilities in assets are identified, validated, and recorded."
  - control_id: "PR.AA-01"
    category: "Protect - Identity Management"
    title: "Identities and credentials are managed"
    description: "Identities and credentials for authorized users, services, and hardware are managed."
  - control_id: "PR.AA-03"
    category: "Protect - Identity Management"
    title: "Users and devices are authenticated"
    description: "Users, services, and hardware are authenticated."
  - control_id: "PR.AA-05"
    category: "Protect - Identity Management"
    title: "Access permissions are managed"
    description: "Access permissions, entitlements, and authorizations are defined in a policy, managed, enforced, and reviewed."
  - control_id: "PR.DS-01"
    category: "Protect - Data Security"
    title: "Data-at-rest is protected"
    description: "The confidentiality, integrity, and availability of data-at-rest are protected."
  - control_id: "PR.DS-02"
    category: "Protect - Data Security"
    title: "Data-in-transit is protected"
    description: "The confidentiality, integrity, and availability of data-in-transit are protected."
  - control_id: "PR.PS-04"
    category: "Protect - Platform Security"
    title: "Log records are generated"
    description: "Log records are generated and made available for continuous monitoring."
  - control_id: "DE.CM-01"
    category: "Detect - Continuous Monitoring"
    title: "Networks are monitored"
    description: "Networks and network services are monitored to find potentially adverse events."
  - control_id: "DE.CM-03"
    category: "Detect - Continuous Monitoring"
    title: "Personnel activity is monitored"
    description: "Personnel activity and technology usage are monitored to find potentially adverse events."
  - control_id: "DE.AE-02"
    category: "Detect - Adverse Event Analysis"
    title: "Potentially adverse events are analyzed"
    description: "Potentially adverse events are analyzed to better characterize them."
  - control_id: "DE.AE-06"
    category: "Detect - Adverse Event Analysis"
    title: "Information is made available to authorized staff"
    description: "Information on adverse events is provided to authorized staff and tools."
  - control_id: "RS.MA-01"
    category: "Respond - Incident Management"
    title: "Incidents are declared"
    description: "The characteristics of an incident are assessed to inform categorization and prioritization."
  - control_id: "RS.AN-03"
    category: "Respond - Incident Analysis"
    title: "Analysis is performed to establish what has occurred"
    description: "Analysis is performed to establish what has occurred and the root cause of the incident."
  - control_id: "RS.CO-02"
    category: "Respond - Incident Response Reporting"
    title: "Incidents are reported to stakeholders"
    description: "Internal and external stakeholders are notified of incidents."
  - control_id: "RC.RP-01"
    category: "Recover - Incident Recovery Plan"
    title: "Recovery plan is executed"
    description: "The recovery portion of the incident response plan is executed once initiated from the incident response process."
