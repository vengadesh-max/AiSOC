framework: iso27001
name: ISO/IEC 27001:2022
description: International standard for information security management systems (ISMS)
controls:
  - control_id: "A.5.1"
    category: "Organizational Controls"
    title: "Policies for information security"
    description: "Information security policy and topic-specific policies shall be defined, approved by management, published, communicated to, and acknowledged by relevant personnel."
  - control_id: "A.5.2"
    category: "Organizational Controls"
    title: "Information security roles and responsibilities"
    description: "Information security roles and responsibilities shall be defined and allocated according to the organizational needs."
  - control_id: "A.5.10"
    category: "Organizational Controls"
    title: "Acceptable use of information and other associated assets"
    description: "Rules for the acceptable use and procedures for handling information and other associated assets shall be identified, documented and implemented."
  - control_id: "A.5.15"
    category: "Organizational Controls"
    title: "Access control"
    description: "Rules to control physical and logical access to information and other associated assets shall be established and implemented."
  - control_id: "A.5.16"
    category: "Organizational Controls"
    title: "Identity management"
    description: "The full life cycle of identities shall be managed."
  - control_id: "A.5.17"
    category: "Organizational Controls"
    title: "Authentication information"
    description: "Allocation and management of authentication information shall be controlled by a management process."
  - control_id: "A.5.18"
    category: "Organizational Controls"
    title: "Access rights"
    description: "Access rights to information and other associated assets shall be provisioned, reviewed, modified and removed."
  - control_id: "A.5.26"
    category: "Organizational Controls"
    title: "Response to information security incidents"
    description: "Information security incidents shall be responded to in accordance with the documented procedures."
  - control_id: "A.5.28"
    category: "Organizational Controls"
    title: "Collection of evidence"
    description: "The organization shall establish and implement procedures for the identification, collection, acquisition and preservation of evidence."
  - control_id: "A.6.2"
    category: "People Controls"
    title: "Terms and conditions of employment"
    description: "Employment contractual agreements shall state the personnel's and the organization's responsibilities for information security."
  - control_id: "A.6.8"
    category: "People Controls"
    title: "Information security event reporting"
    description: "Personnel shall be provided with a mechanism to report information security events through appropriate channels in a timely manner."
  - control_id: "A.7.1"
    category: "Physical Controls"
    title: "Physical security perimeters"
    description: "Security perimeters shall be defined and used to protect areas that contain information and other associated assets."
  - control_id: "A.8.2"
    category: "Technological Controls"
    title: "Privileged access rights"
    description: "The allocation and use of privileged access rights shall be restricted and managed."
  - control_id: "A.8.5"
    category: "Technological Controls"
    title: "Secure authentication"
    description: "Secure authentication technologies and procedures shall be implemented based on information access restrictions."
  - control_id: "A.8.6"
    category: "Technological Controls"
    title: "Capacity management"
    description: "The use of resources shall be monitored and adjusted in line with current and expected capacity requirements."
  - control_id: "A.8.7"
    category: "Technological Controls"
    title: "Protection against malware"
    description: "Protection against malware shall be implemented and supported by appropriate user awareness."
  - control_id: "A.8.15"
    category: "Technological Controls"
    title: "Logging"
    description: "Logs that record activities, exceptions, faults and other relevant events shall be produced, stored, protected and analysed."
  - control_id: "A.8.16"
    category: "Technological Controls"
    title: "Monitoring activities"
    description: "Networks, systems and applications shall be monitored for anomalous behaviour and appropriate actions taken to evaluate potential information security incidents."
  - control_id: "A.8.25"
    category: "Technological Controls"
    title: "Secure development life cycle"
    description: "Rules for the secure development of software and systems shall be established and applied."
