    LakeQueryRequest:
      properties:
        sql:
          type: string
          maxLength: 200000
          minLength: 1
          title: Sql
          description: 'SELECT query to run against the warm tier. The server enforces
            a single-statement, allowlisted-tables-only policy and injects ``tenant_id``
            predicates before execution. Use ``GET /api/v1/lake/schema`` to discover
            available tables and columns. Allowed tables: aisoc.alert_metrics, aisoc.ioc_enrichments,
            aisoc.raw_events.'
        row_cap:
          anyOf:
          - type: integer
            maximum: 100000.0
            minimum: 1.0
          - type: 'null'
          title: Row Cap
          description: Optional ``LIMIT`` clamp; defaults to 10000, hard-capped at
            100000.
        timeout_seconds:
          anyOf:
          - type: number
            maximum: 60.0
            exclusiveMinimum: 0.0
          - type: 'null'
          title: Timeout Seconds
          description: Optional wall-clock cap. Defaults to the server cap (30s).
            Useful for agent loops that need to fail fast.
      type: object
      required:
      - sql
      title: LakeQueryRequest
      description: 'Request body for ``POST /api/v1/lake/sql``.


        Only ``sql`` is required. ``row_cap`` lets an operator request a

        smaller-than-default result set (e.g. for paginated UIs); the

        rewriter clamps to :data:`MAX_ROW_CAP` regardless. ``timeout_seconds``

        likewise lets the caller fail fast — useful for agent loops where a

        30-second hang would compound into a wall-clock budget overrun.'
    LakeQueryResponse:
      properties:
        columns:
          items:
            type: string
          type: array
          title: Columns
        rows:
          items:
            items: {}
            type: array
          type: array
          title: Rows
        row_count:
          type: integer
          title: Row Count
        row_cap:
          type: integer
          title: Row Cap
        referenced_tables:
          items:
            type: string
          type: array
          title: Referenced Tables
        elapsed_ms:
          type: integer
          title: Elapsed Ms
        executed_at:
          type: string
          format: date-time
          title: Executed At
      type: object
      required:
      - columns
      - rows
      - row_count
      - row_cap
      - referenced_tables
      - elapsed_ms
      - executed_at
      title: LakeQueryResponse
      description: 'Response body for ``POST /api/v1/lake/sql``.


        ``referenced_tables`` is the set of allowlisted tables the

        rewriter actually touched — it''s surfaced for clients that want

        to flag "you queried raw_events" in a UI without re-parsing the

        SQL themselves.'
