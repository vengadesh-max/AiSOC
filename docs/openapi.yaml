  /api/v1/connectors/{connector_id}/capabilities:
    put:
      tags:
      - connectors
      summary: Update Connector Capabilities
      description: "Downscope which capabilities the agent may invoke against this\
        \ instance.\n\nThe contract:\n\n* ``allowed_capabilities = None`` clears the\
        \ downscope. The agent reverts\n  to the connector class's full ``capabilities()``\
        \ declaration.\n* ``allowed_capabilities = []`` is a *legitimate* operator\
        \ action: it\n  pins the agent to zero capabilities for this instance. Polling\
        \ and\n  data ingestion are unaffected — only agent-initiated actions are\n\
        \  gated by this column.\n* Any string in the list MUST appear in the connector\
        \ class's declared\n  capabilities. We validate against the live catalog so\
        \ a tampered\n  request can't widen the agent's reach beyond what the connector\
        \ code\n  actually implements.\n\nThe narrowing happens at the read path\n\
        (``BaseConnector.effective_capabilities()``), not here, so the column\nis\
        \ purely a per-instance allow-list — flipping it back to ``None``\ninstantly\
        \ restores the class default with no migration."
      operationId: update_connector_capabilities_api_v1_connectors__connector_id__capabilities_put
      security:
      - HTTPBearer: []
      parameters:
      - name: connector_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Connector Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCapabilitiesRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
