    get:
      tags:
      - costs
      summary: LLM spend, action counts, top-cost cases, and BYOK savings for the
        tenant
      description: "Return a deterministic snapshot of cost, activity, and BYOK savings.\n\
        \nThe response covers the rolling ``window_days``-long window ending at\n\
        ``now()`` (UTC) and includes:\n\n* **headline** — total spend / tokens / calls\
        \ / runs and average\n  cost-per-run across the window.\n* **daily_costs**\
        \ — per-day buckets so the UI can plot a trend line.\n* **by_model** — spend,\
        \ tokens, runs, and average latency per model\n  with the imputed public-list\
        \ cost for context.\n* **top_cases** — the most expensive ``case_id`` values,\
        \ the closest\n  proxy AiSOC has for \"top-cost playbook runs\" since each\
        \ playbook\n  run lives under a case (no separate ``playbook_runs`` table).\n\
        * **action_counts** — ``audit_log`` action distribution so operators\n  can\
        \ see how much SOC activity their LLM spend is buying.\n* **byok_savings**\
        \ — imputed delta between recorded cost and public\n  list pricing. ``is_byok_active``\
        \ reflects whether the live LLM\n  provider is loopback / private (per ``/llm/status``).\n\
        \nTenant scoping is enforced by ``TenantDBSession`` (Postgres RLS sets\n``app.current_tenant_id``)\
        \ plus an explicit ``tenant_id`` predicate in\nthe underlying query, so the\
        \ same payload is safe to render for any\nrole with ``reports:read``."
      operationId: get_cost_dashboard_api_v1_costs_dashboard_get
