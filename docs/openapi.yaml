            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: False Positive Rate
      type: object
      required:
      - findings
      title: AddFindingsRequest
    AgentToolDescriptor:
      properties:
        name:
          type: string
          title: Name
          description: Stable unique identifier for this tool, formatted as '<connector_instance_id>.<capability>'.
            The connector_instance_id rather than connector_type so multiple instances
            of the same connector — e.g. two CrowdStrike tenants — are addressable.
        connector_id:
          type: string
          title: Connector Id
          description: Connector instance UUID.
        connector_type:
          type: string
          title: Connector Type
          description: Catalog connector type, e.g. 'crowdstrike'.
        connector_name:
          type: string
          title: Connector Name
          description: Operator-chosen instance display name (e.g. 'CrowdStrike —
            prod').
        category:
          type: string
          title: Category
          description: Catalog category, e.g. 'edr', 'siem', 'iam'.
        capability:
          type: string
          title: Capability
          description: The capability verb (one of the values from the Capability
            enum, e.g. 'pull_alerts', 'query_logs', 'isolate_host').
        capability_group:
          type: string
          title: Capability Group
          description: Coarse grouping derived from CAPABILITY_GROUPS in services/connectors.
            Lets an agent pre-filter by intent — e.g. only consider 'CONTAIN' verbs
            when deciding to quarantine a host.
        description:
          type: string
          title: Description
          description: Human-readable summary of the verb, surfaced in tool prompts.
        input_schema:
          additionalProperties: true
          type: object
          title: Input Schema
          description: JSON-Schema for the verb's arguments. Empty by default; concrete
            connectors will fill this in as the per-capability call surface stabilises
            in subsequent workstreams.
      type: object
      required:
      - name
      - connector_id
      - connector_type
      - connector_name
      - category
      - capability
      - capability_group
      - description
      title: AgentToolDescriptor
      description: "One callable verb on one connector instance, as the agent sees\
        \ it.\n\nThe descriptor is intentionally LLM-friendly:\n\n* ``name`` is unique\
        \ per tenant (``{connector_id}.{capability}``) and\n  stable across redeploys,\
        \ so an agent's tool-choice memory still\n  resolves after a redeployment.\n\
        * ``description`` is human-readable and pulled from the connector\n  class\
        \ so updates ship with the connector code, not the agent.\n* ``input_schema``\
        \ follows JSON-Schema conventions so most agent\n  frameworks (LangChain,\
        \ LangGraph, MCP) can drop it in unchanged."
    AgentToolsResponse:
      properties:
        tools:
          items:
            $ref: '#/components/schemas/AgentToolDescriptor'
          type: array
          title: Tools
        tool_count:
          type: integer
          title: Tool Count
        connector_count:
          type: integer
          title: Connector Count
      type: object
      required:
      - tools
      - tool_count
      - connector_count
      title: AgentToolsResponse
      description: Tenant-wide tool catalogue surfaced to the agent layer.
