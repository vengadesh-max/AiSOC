      - agents
      summary: List Agent Tools
      description: "Return the agent's allowed tool surface for this tenant.\n\nThe\
        \ pivot is **instance × effective capability**:\n\n1. Pull every enabled connector\
        \ for the tenant.\n2. For each instance, look up the connector class's declared\n\
        \   capabilities from the live catalog.\n3. Intersect with the per-instance\
        \ ``allowed_capabilities`` column\n   (``NULL`` = no downscope; ``[]`` = explicit\
        \ zero verbs; non-empty\n   list = exact allowlist).\n4. Emit one ``AgentToolDescriptor``\
        \ per surviving (instance, capability)\n   pair.\n\nResult is sorted deterministically\
        \ by ``(connector_name, capability)``\nso two consecutive calls return the\
        \ same ordering — important for\nagent caches keyed off tool list hashes."
      operationId: list_agent_tools_api_v1_agents_tools_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentToolsResponse'
