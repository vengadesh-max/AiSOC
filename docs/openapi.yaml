openapi: 3.1.0
info:
  title: AiSOC Platform API
  description: |
    Open-source AI Security Operations Center by Cyble (v5.1.0).

    Autonomous threat detection, investigation, and response — with UEBA behavioral
    analytics, honeytoken deception, purple-team adversary emulation, enterprise RBAC,
    immutable audit logging, and SOC 2 / ISO 27001 / NIST CSF compliance dashboards.

    ## Authentication
    Most endpoints require a JWT Bearer token obtained from `POST /api/v1/auth/login`.
    Service-to-service calls may use an API key via `X-API-Key` header.

    ## Multi-tenancy
    All data is isolated via PostgreSQL Row-Level Security. The `tenant_id` is derived
    from the authenticated token and cannot be overridden by the caller.

    ## Rate limiting
    Default: 1000 req/min per API key; 100 req/min per user token.
    Limits are surfaced via `X-RateLimit-*` response headers.
  version: 5.1.0
  contact:
    name: AiSOC Community
    url: https://github.com/beenuar/AiSOC
    email: security@cyble.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
x-tagGroups:
  - name: Identity & Access
    tags: [auth, api-keys, rbac]
  - name: Detection & Hunting
    tags: [alerts, rules, detections]
  - name: Cases & Response
    tags: [cases, playbooks, actions]
  - name: Threat Intelligence
    tags: [intel, enrichment]
  - name: Advanced Detection
    tags: [ueba, honeytokens, purple-team]
  - name: Plugins & Marketplace
    tags: [plugins, marketplace]
  - name: Governance
    tags: [compliance, audit, sla]
  - name: Graph
    tags: [graph]
paths:
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Login
      description: Authenticate with email/password, return JWT tokens.
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh Token
      description: Refresh access token using a valid refresh token.
      operationId: refresh_token_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
