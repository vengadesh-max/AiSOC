          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /graphql:
    get:
      tags:
      - graphql
      summary: Handle Http Get
      operationId: handle_http_get_graphql_get
      responses:
        '200':
          description: The GraphiQL integrated development environment.
          content:
            application/json:
              schema: {}
        '404':
          description: Not found if GraphiQL or query via GET are not enabled.
      security:
      - HTTPBearer: []
    post:
      tags:
      - graphql
      summary: Handle Http Post
      operationId: handle_http_post_graphql_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /health:
    get:
      tags:
      - system
      summary: Health Check
      description: 'Health check endpoint.


        Includes the current air-gap policy snapshot so operators can confirm

        zero-egress mode is engaged on this pod (Tier 3.1).'
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Check Health Get
  /metrics:
    get:
      tags:
      - system
      summary: Metrics
      description: "Prometheus metrics endpoint.\n\nAuth gate:\n\n* If ``settings.METRICS_TOKEN``\
        \ is set, callers MUST present\n  ``Authorization: Bearer <METRICS_TOKEN>``.\
        \ Comparison uses\n  ``hmac.compare_digest`` to avoid timing leaks.\n* If\
        \ ``METRICS_TOKEN`` is empty, the endpoint is open **only** in a\n  development-class\
        \ environment. In any other environment we refuse\n  the scrape with a 401\
        \ so operators don't accidentally ship an\n  unauthenticated metrics endpoint\
        \ to the open internet."
      operationId: metrics_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
