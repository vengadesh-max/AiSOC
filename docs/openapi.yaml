      summary: Revoke Token
      description: 'Permanently revoke an inbox token without minting a replacement.


        The ingest service rejects revoked tokens; we keep the row so the

        UI can still show "this token was revoked at X" in audit views.'
      operationId: revoke_token_api_v1_inbox_tokens__token_fingerprint__delete
