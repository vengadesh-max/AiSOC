      - lake
      summary: Execute Lake Sql
      description: "Run a tenant-scoped SELECT against the warm tier.\n\nPipeline:\n\
        \n1. Rate-limit the tenant.\n2. Rewrite the SQL — adds ``tenant_id`` predicates\
        \ and clamps\n   ``LIMIT``. Errors here are 400 (syntax) or 403 (forbidden).\n\
        3. Execute against ClickHouse with the configured timeout +\n   resource caps.\
        \ Errors here are 502 (driver/server error),\n   422 (timeout / memory limit),\
        \ or 503 (driver not configured).\n4. Audit-log the call. We record the rewriter's\
        \ view of the\n   query (referenced tables, effective row cap) rather than\
        \ the\n   raw SQL, because audit logs are user-facing and we don't want\n\
        \   to round-trip a malformed or PII-laden SQL string into the\n   compliance\
        \ UI."
      operationId: execute_lake_sql_api_v1_lake_sql_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LakeQueryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LakeQueryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/lake/schema:
    get:
      tags:
      - lake
      summary: Get Lake Schema
      description: 'Return column metadata for the lake''s allowlisted tables.


        Schema discovery is read-only and never returns row data, so it''s

        safe to grant to roles that should not be allowed to execute

        SELECTs (``viewer`` has ``lake:read_schema`` but not

        ``lake:query``). The response is also tenant-independent —

        everyone sees the same columns — but we still rate-limit and

        audit-log it so noisy clients can''t drum the endpoint into a DoS.'
      operationId: get_lake_schema_api_v1_lake_schema_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LakeSchemaResponse'
      security:
      - HTTPBearer: []
  /auth/saml/login:
    get:
      tags:
      - auth-saml
      summary: Saml Login
      description: Initiate SAML SSO — redirect to IdP.
      operationId: saml_login_auth_saml_login_get
      parameters:
      - name: redirect
        in: query
        required: false
        schema:
          type: string
          default: /
          title: Redirect
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/saml/acs:
