              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/oidc/userinfo:
    get:
      tags:
      - auth-oidc
      summary: Oidc Userinfo
      description: 'Proxy userinfo from upstream OIDC provider using the stored access
        token.


        Requires `Authorization: Bearer <aisoc_jwt>` header — the JWT sub is

        used to look up the upstream token (stub: returns claims from AiSOC JWT).'
      operationId: oidc_userinfo_auth_oidc_userinfo_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /auth/oidc/logout:
    get:
