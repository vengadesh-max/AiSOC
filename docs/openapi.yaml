      summary: Oidc Login
      description: Initiate OIDC authorization code flow.
      operationId: oidc_login_auth_oidc_login_get
      parameters:
      - name: redirect
        in: query
        required: false
        schema:
          type: string
          default: /
          title: Redirect
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/oidc/callback:
    get:
      tags:
      - auth-oidc
      summary: Oidc Callback
      description: Handle OIDC authorization code callback and issue JWT.
      operationId: oidc_callback_auth_oidc_callback_get
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
          title: Code
      - name: state
        in: query
        required: true
        schema:
          type: string
          title: State
      - name: error
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      responses:
