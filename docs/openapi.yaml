openapi: 3.1.0
info:
  title: AiSOC Platform API
  description: AiSOC — open-source AI Security Operations Center. Autonomous threat
    detection, investigation, and response.
  version: 0.1.0
paths:
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Login
      description: Authenticate with email/password, return JWT tokens.
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh Token
      description: Refresh access token using a valid refresh token.
      operationId: refresh_token_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - auth
      summary: Get Me
      description: Get current authenticated user info.
      operationId: get_me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
      security:
      - HTTPBearer: []
  /api/v1/auth/me/preferences:
    patch:
      tags:
      - auth
      summary: Patch Me Preferences
      description: 'Merge user preferences (e.g. theme) into the stored JSONB column.


        Only the keys supplied in the request body are updated; all other

        existing keys are preserved.  This lets the frontend evolve independent

        preference namespaces without overwriting each other.'
      operationId: patch_me_preferences_api_v1_auth_me_preferences_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferencesPatch'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/api-keys:
    post:
      tags:
      - api-keys
      summary: Create Api Key
      description: 'Create a new scoped API key for the current tenant.


        The raw key value is returned **only once** in this response.'
      operationId: create_api_key_api_v1_api_keys_post
      parameters:
      - name: current_user
        in: query
        required: true
        schema:
          title: Current User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - api-keys
      summary: List Api Keys
      description: List all API keys for the current tenant (raw keys are never returned).
      operationId: list_api_keys_api_v1_api_keys_get
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyOut'
                title: Response List Api Keys Api V1 Api Keys Get
  /api/v1/api-keys/{key_id}:
    get:
      tags:
      - api-keys
      summary: Get Api Key
      description: Get metadata for a specific API key.
      operationId: get_api_key_api_v1_api_keys__key_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - api-keys
      summary: Update Api Key
      description: Update an API key's name, scopes, or expiry.
      operationId: update_api_key_api_v1_api_keys__key_id__patch
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      - name: current_user
        in: query
        required: true
        schema:
          title: Current User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApiKeyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - api-keys
      summary: Revoke Api Key
      description: Revoke (deactivate) an API key. The key can no longer be used for
        authentication.
      operationId: revoke_api_key_api_v1_api_keys__key_id__delete
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      - name: current_user
        in: query
        required: true
        schema:
          title: Current User
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/alerts/submit:
    post:
      tags:
      - alerts
      summary: Submit Alert
      description: 'Submit one alert directly from an OCSF event batch.


        This is the destination for `aisoc submit <file>` and the local-dev fast

        path documented in the quickstart. We deliberately bypass the Kafka

        detect/correlate/fuse pipeline (which fresh clones don''t run by default)

        so that a hand-crafted fixture lands in the database — and therefore in

        ``GET /api/v1/alerts`` and the web console — within the same second.


        Authorisation: requires ``alerts:write``. In development mode the

        auth bypass in :mod:`app.api.v1.deps` resolves to the deterministic

        demo tenant, so the documented ``aisoc submit`` CLI works against a

        fresh clone with no token plumbing.'
      operationId: submit_alert_api_v1_alerts_submit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertSubmitRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/alerts:
    get:
      tags:
      - alerts
      summary: List Alerts
      description: 'List alerts for the current tenant with filtering and pagination.


        `min_confidence` / `confidence_label` let the queue workbench (PR-5) and

        /alerts page filter on the fusion-emitted confidence signal (W3). Alerts

        that pre-date the confidence column will have NULL and therefore won''t

        match either filter — that''s intentional; analysts who care about

        confidence should only see alerts that actually carry the signal.'
      operationId: list_alerts_api_v1_alerts_get
      security:
      - HTTPBearer: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 25
          title: Page Size
      - name: severity
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Severity
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
      - name: assigned_to_me
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Assigned To Me
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      - name: min_confidence
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            maximum: 100
            minimum: 0
          - type: 'null'
          title: Min Confidence
      - name: confidence_label
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Confidence Label
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/alerts/stats:
    get:
      tags:
      - alerts
      summary: Get Alert Stats
      description: Get alert statistics for the dashboard.
      operationId: get_alert_stats_api_v1_alerts_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertStatsResponse'
      security:
      - HTTPBearer: []
  /api/v1/alerts/queue:
    get:
      tags:
      - alerts
      summary: Get Alert Queue
      description: 'Investigation Queue workbench feed.


        Returns the prioritised list of alerts the analyst should work on

        next: alerts assigned to them, followed by unassigned

        critical/high alerts, ordered by SLA due time.


        The endpoint also returns ``counts`` for both buckets unconditionally

        so the topbar badge and the workbench tabs can render without an

        extra round-trip.'
      operationId: get_alert_queue_api_v1_alerts_queue_get
      security:
      - HTTPBearer: []
      parameters:
      - name: owner
        in: query
        required: false
        schema:
          enum:
          - me
          - unassigned
          - all
          type: string
          default: all
          title: Owner
      - name: period
        in: query
        required: false
        schema:
          enum:
          - 24h
          - 7d
          - 30d
          - all
          type: string
          default: all
          title: Period
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Page Size
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/alerts/{alert_id}:
    get:
      tags:
      - alerts
      summary: Get Alert
      description: "Get a single alert by ID, enriched with Investigation Rail data.\n\
        \nThe endpoint returns the standard alert fields plus everything the\nrail\
        \ needs to render in one shot:\n\n* a deterministic ``narrative`` (lazily\
        \ filled and persisted if the\n  row was created before fusion started emitting\
        \ it),\n* ``related_entities`` grouped for pivot,\n* a compact ``mini_timeline``,\n\
        * normalised ``recommended_actions``.\n\nThe lazy-fill is best-effort: if\
        \ the narrative builder ever raises\nwe log and return the alert with ``narrative=None``\
        \ so the page\nkeeps rendering. The frontend already handles the null case."
      operationId: get_alert_api_v1_alerts__alert_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Alert Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - alerts
      summary: Update Alert
      description: Update alert status, priority, tags, assignment, or case link.
      operationId: update_alert_api_v1_alerts__alert_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Alert Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/alerts/{alert_id}/escalate:
    post:
      tags:
      - alerts
      summary: Escalate Alert
      description: Escalate an alert (raises severity by one level).
      operationId: escalate_alert_api_v1_alerts__alert_id__escalate_post
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Alert Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/alerts/{alert_id}/claim:
    post:
      tags:
      - alerts
      summary: Claim Alert Endpoint
      description: 'Atomically claim an unassigned alert for the current user.


        Returns ``409 Conflict`` if the alert is already assigned to someone

        else — the claim is a compare-and-set on ``assigned_to_id``, so two

        analysts racing for the same alert never both win.'
      operationId: claim_alert_endpoint_api_v1_alerts__alert_id__claim_post
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Alert Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/alerts/{alert_id}/snooze:
    post:
      tags:
      - alerts
      summary: Snooze Alert
      description: 'Defer an alert for a fixed window from the mobile responder PWA.


        Either ``duration_minutes`` or ``until`` must be supplied. The alert

        re-surfaces in the queue once ``snoozed_until`` is in the past.'
      operationId: snooze_alert_api_v1_alerts__alert_id__snooze_post
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Alert Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertSnoozeRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/alerts/{alert_id}/explain:
    post:
      tags:
      - alerts
      summary: Generate a structured AI explanation for an alert
      description: 'Return a structured explanation for one alert.


        This is the *single-shot* counterpart to the agent service''s

        NDJSON stream. Use this when the client is a non-interactive

        consumer (PDF builder, SOAR playbook, mobile app) or when the

        UI just wants the final payload without rendering tokens.'
      operationId: explain_alert_api_v1_alerts__alert_id__explain_post
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Alert Id
      responses:
        '200':
          description: Structured explanation payload (rule lineage, MITRE, FPR, actions,
            summary)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Explain Alert Api V1 Alerts  Alert Id  Explain Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cases:
    get:
      tags:
      - cases
      summary: List cases
      operationId: list_cases_api_v1_cases_get
      security:
      - HTTPBearer: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: severity
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Severity
      - name: assignee
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Assignee
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CaseResponse'
                title: Response List Cases Api V1 Cases Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - cases
      summary: Create case
      operationId: create_case_api_v1_cases_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cases/{case_id}:
    get:
      tags:
      - cases
      summary: Get case
      operationId: get_case_api_v1_cases__case_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: case_id
        in: path
        required: true
        schema:
          type: string
          title: Case Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - cases
      summary: Update case
      operationId: update_case_api_v1_cases__case_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: case_id
        in: path
        required: true
        schema:
          type: string
          title: Case Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCaseRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cases/{case_id}/alerts:
    post:
      tags:
      - cases
      summary: Link alerts to a case
      operationId: add_alerts_api_v1_cases__case_id__alerts_post
      security:
      - HTTPBearer: []
      parameters:
      - name: case_id
        in: path
        required: true
        schema:
          type: string
          title: Case Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAlertsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cases/{case_id}/observables:
    post:
      tags:
      - cases
      summary: Update observable graph
      operationId: update_observables_api_v1_cases__case_id__observables_post
      security:
      - HTTPBearer: []
      parameters:
      - name: case_id
        in: path
        required: true
        schema:
          type: string
          title: Case Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateObservablesRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cases/{case_id}/comments:
    post:
      tags:
      - cases
      summary: Add comment
      operationId: add_comment_api_v1_cases__case_id__comments_post
      security:
      - HTTPBearer: []
      parameters:
      - name: case_id
        in: path
        required: true
        schema:
          type: string
          title: Case Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCommentRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - cases
      summary: List case comments
      operationId: list_comments_api_v1_cases__case_id__comments_get
      security:
      - HTTPBearer: []
      parameters:
      - name: case_id
        in: path
        required: true
        schema:
          type: string
          title: Case Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommentResponse'
                title: Response List Comments Api V1 Cases  Case Id  Comments Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/cases/{case_id}/notes:
    get:
      tags:
      - cases
      summary: List case notes (alias of /comments)
      operationId: list_notes_api_v1_cases__case_id__notes_get
      security:
      - HTTPBearer: []
      parameters:
      - name: case_id
        in: path
