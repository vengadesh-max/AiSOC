  /api/v1/api-keys:
    post:
      tags:
      - api-keys
      summary: Create Api Key
      description: 'Create a new scoped API key for the current tenant.


        The raw key value is returned **only once** in this response.'
      operationId: create_api_key_api_v1_api_keys_post
      parameters:
      - name: current_user
        in: query
        required: true
        schema:
          title: Current User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - api-keys
      summary: List Api Keys
      description: List all API keys for the current tenant (raw keys are never returned).
      operationId: list_api_keys_api_v1_api_keys_get
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyOut'
                title: Response List Api Keys Api V1 Api Keys Get
  /api/v1/api-keys/{key_id}:
    get:
      tags:
      - api-keys
      summary: Get Api Key
      description: Get metadata for a specific API key.
      operationId: get_api_key_api_v1_api_keys__key_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyOut'
        '422':
