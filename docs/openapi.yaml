        \ the response carries no secrets\n(only ``key_set: bool``) and is safe for\
        \ operator dashboards,\nauditors, and k8s liveness probes.\n\nTenant-aware\
        \ callers (the web UI's \"Deployment & AI\" Settings\npanel, the agents service's\
        \ explain path) layer per-tenant BYOK\noverrides on top of this baseline by\
        \ either:\n\n* calling :func:`tenant_llm_status` with their own DB session,\
        \ or\n* pairing this response with ``GET /api/v1/llm/credentials`` to\n  perform\
        \ the merge client-side."
      operationId: get_llm_status_api_v1_llm_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Llm Status Api V1 Llm Status Get
  /api/v1/llm/credentials:
    get:
      tags:
      - llm
      summary: Read the tenant's BYOK LLM credential
      description: 'Return the per-tenant LLM credential, or ``null`` if none stored.


        Returning ``null`` (rather than 404) on the empty case lets the UI

        render a single "Configure your LLM" CTA without dispatching on

        error codes. The Settings panel renders a "no credential set —

        falling back to platform defaults" hint when this is null.'
      operationId: get_llm_credential_api_v1_llm_credentials_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/LlmCredentialView'
                - type: 'null'
                title: Response Get Llm Credential Api V1 Llm Credentials Get
      security:
      - HTTPBearer: []
    put:
      tags:
      - llm
      summary: Upsert the tenant's BYOK LLM credential
      description: "Create or update the tenant's BYOK credential.\n\nBehaviour notes:\n\
        \n* ``api_key`` is required for hosted SaaS providers on first write.\n  A\
        \ subsequent PUT with ``api_key=null`` keeps the stored\n  ciphertext (useful\
        \ when toggling ``enabled`` or changing\n  ``model`` without re-typing the\
        \ secret).\n* Whenever ``api_key`` is provided we bump ``last_rotated_at``\
        \ so\n  the UI can render \"rotated 3 days ago\".\n* The audit row's ``changes``\
        \ payload includes the *fact* of a\n  rotation but never the key itself —\
        \ we only record whether the\n  key was changed, the previous + new providers,\
        \ and whether the\n  row is enabled."
      operationId: upsert_llm_credential_api_v1_llm_credentials_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmCredentialUpsert'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmCredentialView'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
    delete:
      tags:
      - llm
      summary: Remove the tenant's BYOK LLM credential
      description: Hard-delete the credential. Platform falls back to env-var config.
      operationId: delete_llm_credential_api_v1_llm_credentials_delete
      responses:
        '204':
          description: Successful Response
      security:
      - HTTPBearer: []
