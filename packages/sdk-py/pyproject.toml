[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aisoc-sdk"
version = "4.0.0"
description = "Python client SDK for AiSOC — typed httpx client"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["aisoc", "soc", "security", "client", "sdk"]
authors = [{ name = "AiSOC Contributors", email = "oss@aisoc.io" }]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
    "mypy>=1.9",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://github.com/aisoc-os/aisoc"
Documentation = "https://aisoc-os.github.io/aisoc"
Repository = "https://github.com/aisoc-os/aisoc"
Issues = "https://github.com/aisoc-os/aisoc/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aisoc_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true
