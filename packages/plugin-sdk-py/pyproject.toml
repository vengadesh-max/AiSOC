[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aisoc-plugin-sdk"
version = "0.1.0"
description = "AiSOC Plugin SDK for Python — build custom enrichers, connectors, and response actions"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "AiSOC Contributors" },
]
keywords = ["aisoc", "soc", "security", "plugin", "sdk"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
]
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.5",
  "structlog>=24.1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "mypy>=1.8",
  "ruff>=0.3",
]

[project.urls]
Homepage = "https://aisoc.dev"
Documentation = "https://aisoc.dev/docs/plugins/python"
Repository = "https://github.com/beenuar/AiSOC"

[tool.hatch.build.targets.wheel]
packages = ["src/aisoc_plugin_sdk"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
strict = true
python_version = "3.11"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
