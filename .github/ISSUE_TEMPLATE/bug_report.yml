name: Bug Report
description: Report a bug or unexpected behavior in AiSOC
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include screenshots, logs, or stack traces if relevant.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web UI (apps/web)
        - API (services/api)
        - Enrichment (services/enrichment)
        - Ingest (services/ingest)
        - Real-time (services/realtime)
        - Actions/SOAR (services/actions)
        - Agents (services/agents)
        - Docker / Compose
        - Helm / Kubernetes
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AiSOC version
      placeholder: "e.g. v3.0.0 or commit SHA"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node/Python/Go versions, deployment method, etc.
      placeholder: "macOS 14, Chrome 124, Node 20, Docker 26"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the CONTRIBUTING guide
          required: true
