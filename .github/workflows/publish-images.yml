name: Publish Images

# Build and push GHCR images for every push to main, plus on manual dispatch.
# This keeps the `:main` and `:latest` tags fresh so `pnpm aisoc:demo` can
# pull prebuilt images instead of building from source.
#
# Tagged releases are handled by release.yml.

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: services/api
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-core-api
          - service: agents
            context: services/agents
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-agents
          - service: realtime
            context: services/realtime
            dockerfile: Dockerfile
            image: ghcr.io/beenuar/aisoc-realtime
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/beenuar/aisoc-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64
