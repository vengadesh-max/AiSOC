name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Lint & type-check the Next.js web app
  # ──────────────────────────────────────────────
  web-lint:
    name: Web — Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm tsc --noEmit

  # ──────────────────────────────────────────────
  # Build the Next.js web app
  # ──────────────────────────────────────────────
  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    needs: web-lint
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # ──────────────────────────────────────────────
  # Python API & services
  # ──────────────────────────────────────────────
  python-lint:
    name: Python — Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Ruff & Mypy
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check services/api services/actions services/fusion services/agents || true
      - name: Ruff format check
        run: ruff format --check services/api services/actions services/fusion services/agents || true

  python-test:
    name: Python — Tests
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies (api)
        run: |
          cd services/api
          pip install -r requirements.txt pytest pytest-asyncio httpx || true
      - name: Run api tests
        run: |
          cd services/api
          pytest tests/ -v --tb=short || true
      - name: Run agents unit tests (MITRE accuracy)
        run: |
          pip install pytest pytest-asyncio
          cd services/agents
          python3 -m pytest tests/test_mitre_accuracy.py -v --tb=short

  # ──────────────────────────────────────────────
  # Go services (enrichment, ingest, demo-producer)
  # ──────────────────────────────────────────────
  go-build:
    name: Go — Build & Vet
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [enrichment, ingest, demo-producer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: Build
        run: |
          cd services/${{ matrix.service }}
          go build ./...
      - name: Vet
        run: |
          cd services/${{ matrix.service }}
          go vet ./...
      - name: Test
        run: |
          cd services/${{ matrix.service }}
          go test ./... -count=1 || true

  # ──────────────────────────────────────────────
  # Pillar-1 Eval: MITRE ATT&CK tactic accuracy
  # Asserts >=80% accuracy across 20 synthetic incidents (offline, no LLM)
  # ──────────────────────────────────────────────
  p1-eval-mitre:
    name: P1 Eval — MITRE Tactic Accuracy (≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run MITRE accuracy evaluation
        run: python3 scripts/eval_mitre_accuracy.py --json > eval_report.json
      - name: Assert ≥80% accuracy
        run: |
          ACCURACY=$(python3 -c "import json,sys; d=json.load(open('eval_report.json')); print(d['accuracy'])")
          python3 -c "
          acc = float('$ACCURACY')
          print(f'MITRE accuracy: {acc*100:.1f}%')
          assert acc >= 0.80, f'FAIL: {acc*100:.1f}% < 80% threshold'
          print('PASS')
          "
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mitre-accuracy-report
          path: eval_report.json

  # ──────────────────────────────────────────────
  # Pillar-2: Playbook JSON Schema lint
  # Validates all playbook JSON files against schemas/playbook.schema.json
  # ──────────────────────────────────────────────
  p2-playbook-schema-lint:
    name: P2 — Playbook Schema Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Lint playbook files
        run: python3 scripts/lint_playbooks.py

  # ──────────────────────────────────────────────
  # Docker Compose smoke test
  # ──────────────────────────────────────────────
  docker-compose-check:
    name: Docker Compose — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config --quiet
